<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Claude Web Lite</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: #181816;
      color: #f1ede4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    }
    .top {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px;
      background: #181816;
      border-bottom: 1px solid #33302b;
    }
    select, input, textarea, button {
      font: inherit;
      border-radius: 8px;
      border: 1px solid #3c3932;
      background: #24231f;
      color: #f1ede4;
      padding: 8px;
    }
    select { max-width: 42vw; }
    button {
      background: #e8dcc8;
      color: #171511;
      font-weight: 700;
      border: 0;
    }
    button:disabled { opacity: .55; }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 12px 12px 150px;
    }
    .status {
      color: #a9a197;
      font-size: 13px;
      padding: 8px 0;
      min-height: 30px;
    }
    .msg {
      white-space: pre-wrap;
      line-height: 1.55;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .msg-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .msg-content {
      flex: 1;
      min-width: 0;
      white-space: pre-wrap;
      line-height: 1.55;
    }
    .role {
      color: #aaa197;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .msg-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0.6;
      padding-top: 2px;
    }
    .small-btn {
      min-width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: #bdb6aa;
      font-size: 13px;
      cursor: pointer;
      padding: 0 6px;
      transition: background .16s ease, border-color .16s ease, color .16s ease, transform .16s ease;
    }
    .small-btn:active {
      transform: scale(0.94);
      background: rgba(255,255,255,0.14);
    }
    .small-btn.copied {
      color: #a0c8a0;
      border-color: rgba(160,200,160,0.25);
    }
    .small-btn.copy-msg {
      position: relative;
      min-width: 32px;
      width: 32px;
      border-radius: 9px;
      border-color: rgba(210,196,170,0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025));
      color: #c8beb0;
      font-size: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .small-btn.copy-msg::before {
      content: "";
      width: 11px;
      height: 13px;
      border: 1.6px solid currentColor;
      border-radius: 3px;
      transform: translate(2px, -1px);
    }
    .small-btn.copy-msg::after {
      content: "";
      position: absolute;
      width: 11px;
      height: 13px;
      border: 1.6px solid currentColor;
      border-radius: 3px;
      transform: translate(-2px, 2px);
      opacity: .48;
    }
    .small-btn.copy-msg.copied {
      color: #b8e6bd;
      border-color: rgba(164,214,169,0.34);
      background: rgba(92,151,98,0.13);
    }
    .small-btn.copy-msg.copied::before {
      content: "✓";
      width: auto;
      height: auto;
      border: 0;
      font-size: 15px;
      font-weight: 800;
      transform: none;
    }
    .small-btn.copy-msg.copied::after {
      content: none;
    }
    .version-toggle-btn {
      font-size: 12px;
      color: #bdb6aa;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      margin-top: 6px;
    }
    .alt-version {
      border-left: 2px solid rgba(255,255,255,0.12);
      margin: 8px 0;
      padding-left: 10px;
    }
    .alt-version-header {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }
    .alt-version-header .small-btn {
      margin-left: auto;
      min-width: 26px;
      height: 26px;
    }
    .alt-version-badge {
      color: #aaa397;
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      margin-right: 8px;
    }
    .composer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px;
      background: #181816;
      border-top: 1px solid #33302b;
    }
    .composer-inner {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    textarea {
      min-height: 48px;
      max-height: 140px;
      resize: vertical;
    }
  </style>
</head>
<body>
  <div class="top">
    <strong>Lite</strong>
    <select id="profile"></select>
    <button id="newBtn">新对话</button>
  </div>
  <main class="wrap">
    <div id="status" class="status">启动中...</div>
    <div id="chat"></div>
  </main>
  <div class="composer">
    <div class="composer-inner">
      <textarea id="prompt" placeholder="输入消息"></textarea>
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const chat = $("chat");
    const statusEl = $("status");
    const profileEl = $("profile");
    const promptEl = $("prompt");
    const sendBtn = $("sendBtn");
    let profiles = [];
    let messages = [];
    let conversationId = localStorage.getItem("lite_conversation") || "";
    let sending = false;
    let streamController = null;

    function status(text) {
      statusEl.textContent = text || "";
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text || "";
      return d.innerHTML;
    }

    async function api(method, url, body) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 12000);
      try {
        const opt = { method, signal: controller.signal };
        if (body !== undefined) {
          opt.headers = { "Content-Type": "application/json" };
          opt.body = JSON.stringify(body);
        }
        const res = await fetch(url, opt);
        const text = await res.text();
        const data = text ? JSON.parse(text) : {};
        if (!res.ok) throw new Error(data.detail || data.error || "HTTP " + res.status);
        return data;
      } finally {
        clearTimeout(timer);
      }
    }

    function getMessageId(msg) {
      return msg && msg.id !== undefined && msg.id !== null ? String(msg.id) : "";
    }

    function isThinkingMessage(msg) {
      return (msg && (msg.content || "").trim()) === "思考中...";
    }

    function messageHasCopyableText(msg) {
      return !!((msg && msg.content) || "").trim() && !isThinkingMessage(msg);
    }

    function makeSmallButton(className, title, text, msg) {
      const btn = document.createElement("button");
      btn.className = "small-btn " + className;
      btn.type = "button";
      btn.title = title;
      btn.textContent = text;
      btn.dataset.msgId = getMessageId(msg);
      return btn;
    }

    function copyMessageText(btn, msg) {
      const text = (msg && msg.content || "").trim();
      if (!text) return;

      const done = () => {
        btn.classList.add("copied");
        setTimeout(() => {
          btn.classList.remove("copied");
        }, 1500);
      };

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(() => {});
        return;
      }

      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      done();
    }

    function buildVersionChains(msgs) {
      const byId = {};
      msgs.forEach(m => {
        const id = getMessageId(m);
        if (id) byId[id] = m;
        m._versions = [];
      });

      const supersededIds = new Set();
      msgs.forEach(m => {
        const id = getMessageId(m);
        if (id && m.supersededBy) supersededIds.add(id);
      });

      function findLatest(msgId) {
        let current = String(msgId);
        while (byId[current] && byId[current].supersededBy && byId[String(byId[current].supersededBy)]) {
          current = String(byId[current].supersededBy);
        }
        return current;
      }

      const versionGroups = {};
      msgs.forEach(m => {
        const id = getMessageId(m);
        if (id && m.supersededBy) {
          const latestId = findLatest(id);
          if (!versionGroups[latestId]) versionGroups[latestId] = [];
          if (!versionGroups[latestId].some(v => getMessageId(v) === id)) {
            versionGroups[latestId].push(m);
          }
        }
      });

      Object.values(versionGroups).forEach(group => {
        group.sort((a, b) => (a.id || 0) - (b.id || 0));
      });

      msgs.forEach(m => {
        m._versions = versionGroups[getMessageId(m)] || [];
      });

      return msgs.filter(m => !supersededIds.has(getMessageId(m)));
    }

    function render(msgs) {
      messages = msgs;
      const displayMessages = buildVersionChains(msgs);

      chat.innerHTML = "";
      if (!displayMessages.length) {
        chat.innerHTML = '<div class="status">当前对话为空</div>';
        return;
      }
      for (const msg of displayMessages) {
        const box = document.createElement("div");
        box.className = "msg";

        const role = document.createElement("div");
        role.className = "role";
        role.textContent = msg.role === "user" ? "用户" : "助手";
        box.appendChild(role);

        const row = document.createElement("div");
        row.className = "msg-row";

        const body = document.createElement("div");
        body.className = "msg-content";
        body.textContent = msg.content || "";
        row.appendChild(body);

        const actions = document.createElement("div");
        actions.className = "msg-actions";

        if (messageHasCopyableText(msg)) {
          const copyBtn = makeSmallButton("copy-msg", "复制消息", "抄", msg);
          copyBtn.addEventListener("click", () => copyMessageText(copyBtn, msg));
          actions.appendChild(copyBtn);
        }

        if (msg.role === "assistant" && getMessageId(msg) && !isThinkingMessage(msg)) {
          const regenBtn = makeSmallButton("regen-msg", "重新回答", "↻", msg);
          regenBtn.addEventListener("click", () => regenerateMsg(msg));
          actions.appendChild(regenBtn);
        }

        row.appendChild(actions);
        box.appendChild(row);

        // Version toggle
        if (msg._versions && msg._versions.length > 0) {
          const versionSection = document.createElement("div");
          versionSection.style.marginTop = "6px";

          const toggleBtn = document.createElement("button");
          toggleBtn.className = "version-toggle-btn";
          toggleBtn.textContent = "历史版本 (" + msg._versions.length + ")";
          toggleBtn.dataset.closedText = toggleBtn.textContent;
          toggleBtn.dataset.openText = "收起版本";
          versionSection.appendChild(toggleBtn);

          const altContainer = document.createElement("div");
          altContainer.hidden = true;
          altContainer.style.marginTop = "6px";

          msg._versions.forEach((alt) => {
            const altWrap = document.createElement("div");
            altWrap.className = "alt-version";
            const altHeader = document.createElement("div");
            altHeader.className = "alt-version-header";
            const badge = document.createElement("span");
            badge.className = "alt-version-badge";
            badge.textContent = "旧版本";
            altHeader.appendChild(badge);
            if (messageHasCopyableText(alt)) {
              const altCopyBtn = makeSmallButton("copy-msg", "复制历史版本", "抄", alt);
              altCopyBtn.addEventListener("click", () => copyMessageText(altCopyBtn, alt));
              altHeader.appendChild(altCopyBtn);
            }
            altWrap.appendChild(altHeader);
            const altBody = document.createElement("div");
            altBody.style.whiteSpace = "pre-wrap";
            altBody.textContent = alt.content || "";
            altWrap.appendChild(altBody);
            altContainer.appendChild(altWrap);
          });

          toggleBtn.addEventListener("click", () => {
            const willOpen = altContainer.hidden;
            altContainer.hidden = !willOpen;
            toggleBtn.textContent = willOpen ? toggleBtn.dataset.openText : toggleBtn.dataset.closedText;
          });

          versionSection.appendChild(altContainer);
          box.appendChild(versionSection);
        }

        chat.appendChild(box);
      }
      window.scrollTo(0, document.body.scrollHeight);
    }

    async function regenerateMsg(msg) {
      if (sending) return;
      if (!confirm("确定重新回答吗？旧回复将保留并可随时查看。")) return;

      const p = profiles.find(x => x.id === profileEl.value) || {};

      sending = true;
      sendBtn.disabled = true;
      status("重新生成中...");

      try {
        const resp = await fetch("/api/chat/regenerate_from_stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            conversation_id: conversationId,
            message_id: msg.id,
            keep_old: true,
            api_base_url: p.base_url || "",
            api_auth_token: p.auth_token || "",
            api_model: p.model || "claude-opus-4-7",
            api_profile_name: p.name || ""
          })
        });

        if (!resp.ok) {
          const errText = await resp.text().catch(() => "");
          throw new Error("HTTP " + resp.status + ": " + (errText || resp.statusText));
        }

        // Read the stream silently
        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
        }

        await loadMessages();
        status("重新生成完成");
      } catch (e) {
        status("重新生成失败：" + e.message);
      } finally {
        sending = false;
        sendBtn.disabled = false;
      }
    }

    async function loadProfiles() {
      const data = await api("GET", "/api/profiles");
      profiles = data.profiles || [];
      profileEl.innerHTML = "";
      for (const p of profiles) {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = (p.is_default ? "默认 " : "") + p.name + " · " + p.model;
        profileEl.appendChild(opt);
      }
      const def = profiles.find(p => p.is_default) || profiles[0];
      if (def) profileEl.value = def.id;
    }

    async function ensureConversation() {
      if (conversationId) return conversationId;
      const data = await api("POST", "/api/conversations", { title: "Lite 对话" });
      conversationId = data.id;
      localStorage.setItem("lite_conversation", conversationId);
      return conversationId;
    }

    async function loadMessages() {
      await ensureConversation();
      const data = await api("GET", "/api/conversations/" + conversationId + "/messages");
      render(data.messages || []);
    }

    async function init() {
      try {
        await api("GET", "/api/health");
        status("加载配置...");
        await loadProfiles();
        status("加载对话...");
        await loadMessages();
        status("就绪");
      } catch (e) {
        status("加载失败：" + e.message);
      }
    }

    async function send() {
      if (sending) return;
      const text = promptEl.value.trim();
      if (!text) return;
      const p = profiles.find(x => x.id === profileEl.value) || {};
      if (streamController) streamController.abort();
      streamController = new AbortController();
      const streamTimer = setTimeout(() => streamController.abort(), 45000);
      sending = true;
      sendBtn.disabled = true;
      promptEl.value = "";

      status("发送中...");

      try {
        await ensureConversation();
        const res = await fetch("/api/chat/stream", {
          method: "POST",
          signal: streamController.signal,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            conversation_id: conversationId,
            prompt: text,
            api_base_url: p.base_url || "",
            api_auth_token: p.auth_token || "",
            api_model: p.model || "claude-opus-4-7",
            api_profile_name: p.name || ""
          })
        });
        if (!res.ok) throw new Error("HTTP " + res.status + ": " + await res.text());
        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let full = "";
        const userBox = document.createElement("div");
        userBox.className = "msg";
        userBox.innerHTML = '<div class="role">用户</div>';
        const userText = document.createElement("div");
        userText.style.whiteSpace = "pre-wrap";
        userText.textContent = text;
        userBox.appendChild(userText);
        chat.appendChild(userBox);

        const assistantBox = document.createElement("div");
        assistantBox.className = "msg";
        assistantBox.innerHTML = '<div class="role">助手</div>';
        const live = document.createElement("div");
        live.style.whiteSpace = "pre-wrap";
        assistantBox.appendChild(live);
        chat.appendChild(assistantBox);
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          live.textContent = full;
          window.scrollTo(0, document.body.scrollHeight);
        }
        status("完成");
      } catch (e) {
        status((e && e.name === "AbortError") ? "发送超时，已自动断开" : "发送失败：" + e.message);
      } finally {
        clearTimeout(streamTimer);
        streamController = null;
        sending = false;
        sendBtn.disabled = false;
      }
    }

    $("newBtn").onclick = async () => {
      const data = await api("POST", "/api/conversations", { title: "Lite 对话" });
      conversationId = data.id;
      localStorage.setItem("lite_conversation", conversationId);
      await loadMessages();
      status("新对话已创建");
    };
    sendBtn.onclick = send;
    promptEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    init();
  </script>
</body>
</html>
