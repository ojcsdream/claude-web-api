<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1c1c1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Claude Web" />
  <link rel="manifest" href="/static/manifest.webmanifest" />
  <link rel="icon" href="/static/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/static/icons/icon.svg" />
  <title>Claude Web</title>

  <script>
    window.MathJax = {
      loader: {
        load: ["[tex]/mhchem"]
      },
      tex: {
        inlineMath: [["\\(", "\\)"], ["$", "$"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
        processEscapes: true,
        processEnvironments: true,
        packages: {"[+]": ["ams", "mhchem", "noerrors", "noundefined"]}
      },
      chtml: {
        scale: 1.02,
        matchFontHeight: false,
        mtextInheritFont: true
      },
      options: {
        skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
      },
      startup: { typeset: false }
    };
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --ui-bg: #1f1f1d;
      --ui-bg-soft: rgba(255,255,255,0.04);
      --ui-panel: rgba(45, 44, 40, 0.86);
      --ui-panel-strong: rgba(39, 38, 35, 0.96);
      --ui-border: rgba(255,255,255,0.08);
      --ui-border-strong: rgba(255,255,255,0.14);
      --ui-text: #f0ece3;
      --ui-muted: #b9b2a5;
      --ui-dim: #857f75;
      --ui-accent: #e1d5c4;
      --ui-accent-ink: #171715;
      --ui-glow: 0 18px 52px rgba(0,0,0,0.24);
      --glass-bg: rgba(45, 44, 40, 0.58);
      --glass-bg-deep: rgba(36, 35, 32, 0.72);
      --glass-bg-soft: rgba(255, 255, 255, 0.045);
      --glass-bg-surface: rgba(255, 255, 255, 0.035);
      --glass-border: rgba(255, 255, 255, 0.105);
      --glass-border-soft: rgba(255, 255, 255, 0.06);
      --glass-highlight: inset 0 1px 0 rgba(255, 255, 255, 0.075);
      --glass-highlight-strong: inset 0 1px 0 rgba(255, 255, 255, 0.11);
      --glass-shadow-sm: 0 4px 16px rgba(0,0,0,0.10);
      --glass-shadow-md: 0 12px 34px rgba(0,0,0,0.16);
      --glass-shadow-lg: 0 18px 52px rgba(0,0,0,0.24);
      --glass-blur-sm: blur(10px) saturate(1.04);
      --glass-blur-md: blur(16px) saturate(1.06);
      --glass-blur-lg: blur(22px) saturate(1.08);
      --glass-blur-xl: blur(28px) saturate(1.12);
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)),
        var(--ui-bg);
      color: var(--ui-text);
      font-family: ui-serif, Georgia, "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.038), rgba(255,255,255,0.006)),
        rgba(28, 28, 26, 0.34);
      -webkit-backdrop-filter: blur(18px) saturate(1.08);
      backdrop-filter: blur(18px) saturate(1.08);
      border-bottom: 1px solid rgba(255,255,255,0.045);
      box-shadow:
        inset 0 -1px 0 rgba(0,0,0,0.10),
        0 10px 30px rgba(0,0,0,0.08);
    }

    .menu-btn {
      width: 40px;
      height: 40px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.03);
      color: #ddd7cb;
      font-size: 28px;
      border-radius: 12px;
    }

    .menu-btn svg,
    .share-btn svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .title {
      flex: 1;
      font-family: "Iowan Old Style", "Palatino Linotype", "Noto Serif SC", serif;
      font-size: 19px;
      font-weight: 600;
      color: #eee8dc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .share-btn {
      height: 38px;
      padding: 0 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.11);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.018)),
        rgba(255,255,255,0.04);
      color: #f0ece3;
      font-size: 13px;
      font-weight: 650;
    }

    .share-btn svg {
      display: none;
    }

    .top-search-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.018)),
        rgba(255,255,255,0.035);
      color: #e9e2d6;
      font-size: 17px;
      line-height: 1;
    }

    .top-search-btn.active {
      background: rgba(232, 220, 200, 0.16);
      border-color: rgba(232, 220, 200, 0.30);
      color: #fff4df;
    }

    .conversation-search-panel {
      position: fixed;
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 24;
      width: min(760px, calc(100vw - 28px));
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.09);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025)),
        rgba(29, 28, 25, 0.88);
      -webkit-backdrop-filter: blur(18px) saturate(1.06);
      backdrop-filter: blur(18px) saturate(1.06);
      box-shadow: 0 18px 46px rgba(0,0,0,0.34);
      padding: 10px;
    }

    .conversation-search-panel[hidden] {
      display: none;
    }

    .conversation-search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .conversation-search-input,
    .content-search-input {
      width: 100%;
      height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.18);
      color: #f0ece3;
      padding: 0 11px;
      outline: none;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .conversation-search-close {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      color: #d8d3c8;
      font-size: 20px;
      line-height: 1;
    }

    .search-results {
      margin-top: 9px;
      max-height: min(48vh, 420px);
      overflow-y: auto;
    }

    .content-search-results {
      max-height: 260px;
      overflow-y: auto;
      margin-top: 8px;
    }

    .search-result-item {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.065);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      color: #eee8dc;
      text-align: left;
      padding: 9px 10px;
      margin-bottom: 7px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .search-result-item:hover {
      background: rgba(255,255,255,0.055);
      border-color: rgba(255,255,255,0.11);
    }

    .search-result-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #fff5e6;
      font-size: 13px;
      font-weight: 650;
    }

    .search-result-meta {
      flex: 0 0 auto;
      color: #9d9588;
      font-size: 12px;
      font-weight: 500;
    }

    .search-result-snippet {
      margin-top: 5px;
      color: #cfc7b9;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }

    .search-result-snippet mark,
    .search-hit-mark {
      border-radius: 4px;
      background: rgba(238, 211, 147, 0.28);
      color: #fff0c8;
      padding: 0 2px;
    }

    .msg-wrap.search-jump-highlight .bubble {
      outline: 2px solid rgba(238, 211, 147, 0.55);
      box-shadow: 0 0 0 6px rgba(238, 211, 147, 0.08);
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 94px 20px 268px;
    }

    #chatList {
      display: flex;
      flex-direction: column;
      gap: 18px;
      contain: layout style;
    }

    .empty {
      color: #8f887d;
      text-align: center;
      padding-top: 30vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .empty-retry {
      margin-top: 14px;
      height: 38px;
      padding: 0 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #11110f;
      color: #f0ece3;
      font-size: 14px;
      font-weight: 650;
    }

    .claude-welcome {
      position: relative;
      width: 100%;
      min-height: 100%;
      display: flex;
      justify-content: center;
      padding: 0 16px;
      color: #d8d6cc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      animation: welcomeFadeUp 0.52s ease forwards;
    }

    .claude-welcome::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 48% 24%, rgba(232, 111, 87, 0.085), transparent 34%),
        radial-gradient(circle at 58% 54%, rgba(238, 232, 218, 0.045), transparent 38%);
      opacity: 0;
      animation: welcomeAmbient 5.8s 0.12s ease-in-out infinite alternate;
    }

    .claude-welcome-hero {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3.7vw, 18px);
      width: min(100%, 360px);
      margin-top: clamp(132px, 22vh, 180px);
      white-space: nowrap;
      animation: welcomeHeroIn 0.72s cubic-bezier(.2, .8, .2, 1) both;
    }

    .claude-mark {
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      color: rgba(232, 111, 87, 0.88);
      animation: welcomeMarkBloom 1.15s 0.08s cubic-bezier(.2, .8, .2, 1) both;
    }

    .claude-welcome h1 {
      margin: 0;
      color: rgba(216, 214, 204, 0.88);
      font-family: Georgia, "Times New Roman", "Noto Serif SC", "Songti SC", serif;
      font-size: clamp(32px, 8.7vw, 39px);
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: 0;
      animation: welcomeTitleIn 0.76s 0.12s cubic-bezier(.2, .8, .2, 1) both;
    }

    @keyframes welcomeFadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes welcomeAmbient {
      from {
        opacity: 0.38;
        transform: scale(1);
      }
      to {
        opacity: 0.78;
        transform: scale(1.035);
      }
    }

    @keyframes welcomeHeroIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes welcomeMarkBloom {
      0% {
        opacity: 0;
        transform: scale(0.72) rotate(-8deg);
        filter: blur(6px);
      }
      62% {
        opacity: 1;
        transform: scale(1.04) rotate(1deg);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotate(0);
      }
    }

    @keyframes welcomeTitleIn {
      from {
        opacity: 0;
        transform: translateX(8px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      contain: layout style paint;
    }

    .msg-wrap.user {
      align-items: flex-end;
    }

    .msg-wrap.assistant {
      align-items: flex-start;
    }

    .msg {
      width: 100%;
      display: flex;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .msg.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 94%;
      word-break: break-word;
      overflow-x: auto;
      contain: layout style;
    }

    .user .bubble {
      max-width: min(80%, 540px);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.026)),
        rgba(23, 23, 21, 0.64);
      color: #f5f1e8;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow-md), var(--glass-highlight);
      -webkit-backdrop-filter: var(--glass-blur-md);
      backdrop-filter: var(--glass-blur-md);
      border-radius: 18px;
      padding: 12px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 16px;
      line-height: 1.55;
    }

    .assistant .bubble {
      color: #eee9df;
      font-family: "Noto Serif CJK SC", "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", Georgia, "Times New Roman", serif;
      font-size: 17px;
      line-height: 1.68;
      max-width: 100%;
      will-change: contents;
    }

    .bubble.message-collapsed {
      max-height: 340px;
      overflow: hidden;
      position: relative;
    }

    .bubble.message-collapsed::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 96px;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(31,31,29,0), #1f1f1d 82%);
    }

    .msg-wrap.user .bubble.message-collapsed::after {
      background: linear-gradient(180deg, rgba(17,17,15,0), #11110f 82%);
    }

    .message-fold-bar {
      align-self: flex-start;
      margin: 8px 0 0;
      padding: 0;
    }

    .msg-wrap.user .message-fold-bar {
      align-self: flex-end;
      padding-right: 4px;
    }

    .message-fold-btn {
      min-width: 86px;
      height: 32px;
      padding: 0 13px;
      border-radius: 999px;
      border: 1px solid rgba(216, 214, 204, 0.16);
      background: rgba(216, 214, 204, 0.075);
      color: #ddd4c6;
      font-size: 13px;
      font-weight: 650;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
    }

    .stream-caret {
      display: inline-block;
      width: 0.16em;
      height: 1.02em;
      margin-left: 0.1em;
      border-radius: 999px;
      background: rgba(230, 220, 202, 0.55);
      vertical-align: -0.12em;
      animation: streamCaretBlink 1.25s ease-in-out infinite;
    }

    @keyframes streamCaretBlink {
      0%, 42% { opacity: 0.5; }
      50%, 100% { opacity: 0.14; }
    }

    @media (max-width: 760px) {
      .assistant .bubble {
        font-size: 16px;
        line-height: 1.62;
        max-width: 100%;
      }

      .assistant .bubble p {
        margin: 0.24em 0;
      }

      #chatList {
        gap: 16px;
      }
    }


    .assistant .bubble p {
      margin: 0.54em 0;
    }

    .assistant .bubble .streaming-plain-text {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.62;
    }

    .assistant .bubble h1,
    .assistant .bubble h2,
    .assistant .bubble h3,
    .assistant .bubble h4 {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      color: #f7efe2;
      line-height: 1.28;
      margin: 1.05em 0 0.42em;
      font-weight: 780;
      letter-spacing: 0;
    }

    .assistant .bubble h1 { font-size: 1.42em; }
    .assistant .bubble h2 { font-size: 1.26em; }
    .assistant .bubble h3 { font-size: 1.12em; }
    .assistant .bubble h4 { font-size: 1.02em; color: #e7ded0; }

    .assistant .bubble h1:first-child,
    .assistant .bubble h2:first-child,
    .assistant .bubble h3:first-child,
    .assistant .bubble p:first-child {
      margin-top: 0;
    }

    .assistant .bubble ul,
    .assistant .bubble ol {
      margin: 0.48em 0 0.74em;
      padding-left: 1.35em;
    }

    .assistant .bubble li {
      margin: 0.24em 0;
      padding-left: 0.12em;
    }

    .assistant .bubble li::marker {
      color: #cdbb9d;
    }

    .assistant .bubble blockquote {
      margin: 0.9em 0;
      padding: 0.2em 0 0.2em 0.9em;
      border-left: 3px solid rgba(232, 220, 200, 0.28);
      color: #cfc6b9;
      background: rgba(255,255,255,0.025);
      border-radius: 0 10px 10px 0;
    }

    .assistant .bubble blockquote > :first-child {
      margin-top: 0;
    }

    .assistant .bubble blockquote > :last-child {
      margin-bottom: 0;
    }

    .assistant .bubble table {
      width: max-content;
      min-width: min(100%, 520px);
      max-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 1em 0;
      overflow: hidden;
      border: 1px solid rgba(232, 220, 200, 0.18);
      border-radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 0.92em;
    }

    .assistant .bubble th,
    .assistant .bubble td {
      padding: 9px 11px;
      border-right: 1px solid rgba(232, 220, 200, 0.14);
      border-bottom: 1px solid rgba(232, 220, 200, 0.14);
      vertical-align: top;
    }

    .assistant .bubble th {
      background: rgba(255,255,255,0.07);
      color: #f2eadc;
      font-weight: 760;
      text-align: left;
    }

    .assistant .bubble tr:last-child td { border-bottom: 0; }
    .assistant .bubble th:last-child,
    .assistant .bubble td:last-child { border-right: 0; }

    .assistant .bubble :not(pre) > code {
      background: rgba(255,255,255,0.075);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f4dfb8;
      border-radius: 6px;
      padding: 0.08em 0.34em;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.88em;
      white-space: break-spaces;
    }

    .assistant .bubble input[type="checkbox"] {
      width: 1em;
      height: 1em;
      margin: 0 0.42em 0 0;
      vertical-align: -0.12em;
      accent-color: #d6b78f;
    }

    .assistant .bubble sup {
      line-height: 0;
    }

    .assistant .bubble sup a,
    .assistant .bubble .footnote-ref {
      color: #f0c58d;
      text-decoration: none;
    }

    .assistant .bubble .footnotes,
    .assistant .bubble section.footnotes {
      margin-top: 1.25em;
      padding-top: 0.7em;
      border-top: 1px solid rgba(232, 220, 200, 0.18);
      color: #cfc7b9;
      font-size: 0.9em;
    }

    .assistant .bubble hr {
      border: 0;
      border-top: 1px solid rgba(232, 220, 200, 0.20);
      margin: 1.2em 0;
    }

    .assistant .bubble a {
      color: #9ed0ff;
      text-decoration: none;
      border-bottom: 1px solid rgba(158,208,255,0.35);
    }

    .assistant .bubble .source-citation {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.45em;
      height: 1.45em;
      padding: 0 0.34em;
      margin: 0 0.06em;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.055);
      color: #f2ebde;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.74em;
      font-weight: 720;
      line-height: 1;
      vertical-align: 0.08em;
      cursor: pointer;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }

    .assistant .bubble .source-citation:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
    }

    .assistant .bubble .source-citation:active {
      transform: scale(0.96);
    }

    .sources-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(232, 220, 200, 0.16);
    }

    .source-chip {
      display: inline-flex;
      align-items: flex-start;
      gap: 10px;
      max-width: min(100%, 340px);
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.058), rgba(255,255,255,0.024)),
        rgba(32, 31, 28, 0.56);
      color: #e9e1d3;
      text-decoration: none;

    function escapeHtml(t) {
      const d = document.createElement("div");
      d.textContent = t || "";
      return d.innerHTML;
    }

    function escapeRegExp(text) {
      return String(text || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightKeywordHtml(text, keyword) {
      const safe = escapeHtml(text || "");
      const kw = (keyword || "").trim();
      if (!kw) return safe;
      try {
        return safe.replace(new RegExp("(" + escapeRegExp(kw) + ")", "ig"), '<mark>$1</mark>');
      } catch (_) {
        return safe;
      }
    }

    function roleLabel(role) {
      if (role === "assistant") return "助手";
      if (role === "user") return "用户";

    function fieldLabel(field) {
      const map = {
        content: "正文",
        title: "标题",
        file_name: "附件",
        file_context: "文件内容"
      };
      return map[field] || "正文";
    }

    function debounceSearch(fn, delay = 260) {
      let timer = null;
      return (...args) => {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    async function api(method, url, body, form = false) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 15000);

      try {
        const opt = { method, signal: controller.signal };
        if (body !== undefined) {
          if (form) opt.body = body;
          else {
            opt.headers = { "Content-Type": "application/json" };
            opt.body = JSON.stringify(body);
          }
        }

        const r = await fetch(url, opt);
        const text = await r.text();
        let data = {};

        if (text) {
          try {
            data = JSON.parse(text);
          } catch (e) {
            throw new Error("服务返回了非 JSON 内容，可能是公网隧道临时离线");
          }
        }

        if (!r.ok) {
          throw new Error(data.detail || data.error || ("请求失败 HTTP " + r.status));
        }

        return data;
      } catch (e) {
        if (e && e.name === "AbortError") {
          throw new Error("请求超时，请检查本地服务或公网隧道是否在线");
        }
        throw e;
      } finally {
        clearTimeout(timer);
      }
    }

    function activeSystemPromptText() {
      const enabled = systemPrompts.filter(p => p.enabled);
      return enabled.map(p => (p.content || "").trim()).filter(Boolean).join("\n\n");
    }

    function renderSystemPrompts() {
      if (!systemPromptList) return;
      systemPromptList.innerHTML = "";

      if (!systemPrompts.length) {
        systemPromptList.innerHTML = '<div class="session-empty">暂无系统提示词</div>';
        return;
      }

      systemPrompts.forEach(item => {
        const wrap = document.createElement("div");
        wrap.className = "system-prompt-item";

        const row = document.createElement("div");
        row.className = "system-prompt-row";

        const title = document.createElement("div");
        title.className = "system-prompt-title";
        title.textContent = item.title || "系统提示词";

        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "switch-btn" + (item.enabled ? " on" : "");
        toggle.title = item.enabled ? "关闭系统提示词" : "开启系统提示词";
        toggle.onclick = async () => {
          await api("POST", `/api/system-prompts/${item.id}/enabled`, {
            title: item.title || "系统提示词",
            content: item.content || "",
            enabled: !item.enabled
          });
          await loadSystemPrompts();
        };

        const edit = document.createElement("button");
        edit.type = "button";
        edit.className = "section-title-btn";
        edit.textContent = "编辑";
        edit.onclick = () => openSystemPromptEditor(item);

        const preview = document.createElement("div");
        preview.className = "system-prompt-preview";
        preview.textContent = item.content || "空提示词";
        preview.title = "点击展开或折叠";
        preview.onclick = () => preview.classList.toggle("open");

        row.appendChild(title);
        row.appendChild(toggle);
        row.appendChild(edit);
        wrap.appendChild(row);
        wrap.appendChild(preview);
        systemPromptList.appendChild(wrap);
      });
    }

    async function loadSystemPrompts() {
      const data = await api("GET", "/api/system-prompts");
      systemPrompts = data.prompts || [];
      if (!systemPrompts.find(p => p.id === activeSystemPromptId)) {
        const enabled = systemPrompts.find(p => p.enabled);
        activeSystemPromptId = enabled ? enabled.id : (systemPrompts[0] ? systemPrompts[0].id : "");
      }
      renderSystemPrompts();
    }

    function openSystemPromptEditor(item = null) {
      editingSystemPromptId = item && item.id ? item.id : "";
      systemPromptTitle.value = item ? (item.title || "") : "";
      systemPromptContent.value = item ? (item.content || "") : "";
      systemPromptEditorDelete.style.display = editingSystemPromptId ? "inline-flex" : "none";
      systemPromptEditor.classList.add("open");
      systemPromptEditor.setAttribute("aria-hidden", "false");
      setTimeout(() => systemPromptTitle.focus(), 0);
    }

    function closeSystemPromptEditor() {
      systemPromptEditor.classList.remove("open");
      systemPromptEditor.setAttribute("aria-hidden", "true");
      editingSystemPromptId = "";

      const body = {
        title: systemPromptTitle.value.trim() || "系统提示词",
        content: systemPromptContent.value.trim(),
        enabled: editingSystemPromptId
          ? !!(systemPrompts.find(p => p.id === editingSystemPromptId) || {}).enabled
          : false

      if (editingSystemPromptId) {
        await api("PUT", `/api/system-prompts/${editingSystemPromptId}`, body);
      } else {
        const data = await api("POST", "/api/system-prompts", body);
        editingSystemPromptId = data.id || "";

      await loadSystemPrompts();
      closeSystemPromptEditor();

    async function deleteSystemPromptFromEditor() {
      if (!editingSystemPromptId) return closeSystemPromptEditor();
      if (!confirm("确定删除这个系统提示词吗？")) return;
      await api("DELETE", `/api/system-prompts/${editingSystemPromptId}`);
      await loadSystemPrompts();

    function modelLabel(m) {

          fetchModelsStatus.textContent = "拉取失败：" + (data.error || "未知错误");

    function protectCodeSpans(text) {
      const blocks = [];
      const replaced = String(text || "")
        .replace(/```[\s\S]*?```/g, m => {
          const key = `\uE000${blocks.length}\uE001`;
          blocks.push(m);
          return key;
        })
        .replace(/`[^`\n]*`/g, m => {
          const key = `\uE000${blocks.length}\uE001`;
          blocks.push(m);
          return key;
        });
      return { text: replaced, blocks };
    }

    function restoreCodeSpans(text, blocks) {
      return String(text || "").replace(/\uE000(\d+)\uE001/g, (_, idx) => blocks[Number(idx)] || "");
    }

    function normalizeDisplayMathBlocks(text) {
      const src = String(text || "");
      const re = /\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]/g;
      let out = "";
      let last = 0;
      let match;

      while ((match = re.exec(src))) {
        const before = src.slice(last, match.index);
        let raw = match[0];

        if (raw.startsWith("$$")) {
          raw = raw.replace(/^\$\$\s*([\s\S]*?)\s*\$\$$/, (_, inner) => `$$\n${inner.trim()}\n$$`);
        } else {
          raw = raw.replace(/^\\\[\s*([\s\S]*?)\s*\\\]$/, (_, inner) => `\\[\n${inner.trim()}\n\\]`);
        }

        out += before.replace(/[ \t]+$/g, "");
        if (out && !out.endsWith("\n\n")) out += out.endsWith("\n") ? "\n" : "\n\n";
        out += raw;

        last = match.index + match[0].length;
        const rest = src.slice(last);
        const whitespace = rest.match(/^[ \t]*/)[0];
        last += whitespace.length;
        if (last < src.length && !src.slice(last).startsWith("\n")) out += "\n\n";
      }

      out += src.slice(last);
      return out;
    }

    function protectMathForMarkdown(text) {
      const blocks = [];
      const addBlock = (raw, display) => {
        blocks.push({ raw, display });
        return display
          ? `\n\n<div class="math-source math-source-display" data-math-id="${blocks.length - 1}"></div>\n\n`
          : `<span class="math-source math-source-inline" data-math-id="${blocks.length - 1}"></span>`;
      };

      const protectedText = String(text || "")
        .replace(/\$\$[\s\S]*?\$\$/g, m => addBlock(m, true))
        .replace(/\\\[[\s\S]*?\\\]/g, m => addBlock(m, true))
        .replace(/\\begin\{(?:equation|align|aligned|gather|multline|cases|matrix|pmatrix|bmatrix|vmatrix)\*?\}[\s\S]*?\\end\{(?:equation|align|aligned|gather|multline|cases|matrix|pmatrix|bmatrix|vmatrix)\*?\}/g, m => addBlock(`$$\n${m.trim()}\n$$`, true))
        .replace(/\\\([\s\S]*?\\\)/g, m => addBlock(m, false));

      return { text: protectedText, blocks };
    }

    function restoreMarkdownMath(html, blocks) {
      const container = document.createElement("template");
      container.innerHTML = html || "";

      container.content.querySelectorAll(".math-source").forEach(el => {
        const idx = Number(el.dataset.mathId);
        const item = blocks[idx];
        if (!item) return;
        el.textContent = item.raw;
      });

      return container.innerHTML;
    }

    function normalizeMathDelimiters(text) {
      const protectedText = protectCodeSpans(text);
      let x = protectedText.text;

      x = x
        .replace(/\\\[([\s\S]*?)\\\]/g, (_, inner) => `\n$$\n${inner.trim()}\n$$\n`)
        .replace(/\\\(([\s\S]*?)\\\)/g, (_, inner) => `\\(${inner.trim()}\\)`);

      x = normalizeDisplayMathBlocks(x);

      return restoreCodeSpans(x, protectedText.blocks);
    }

    function enhanceRichText(root) {
      root.querySelectorAll("table").forEach(table => {
        if (table.parentElement && table.parentElement.classList.contains("table-scroll")) return;
        const wrap = document.createElement("div");
        wrap.className = "table-scroll";
        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
      });

      root.querySelectorAll("a[href]").forEach(a => {
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      });

      // 为图片添加懒加载和加载状态，防止布局跳动
      root.querySelectorAll("img").forEach(img => {
        if (img.dataset.lazySetup) return;
        img.dataset.lazySetup = "1";

        // 如果图片还没加载，添加占位背景
        if (!img.complete) {
          img.style.backgroundColor = "rgba(255,255,255,0.05)";
          img.style.minHeight = "60px";

          img.addEventListener("load", () => {
            img.style.backgroundColor = "";
            img.style.minHeight = "";
          }, { once: true });

          img.addEventListener("error", () => {
            img.style.backgroundColor = "rgba(255,100,100,0.1)";
            img.style.minHeight = "";
          }, { once: true });
        }
      });
    }

    function normalizeCodeLanguage(lang) {
      const normalized = String(lang || "code").trim().toLowerCase();
      const aliases = {
        js: "javascript",
        jsx: "javascript",
        ts: "typescript",
        tsx: "typescript",
        py: "python",
        sh: "bash",
        shell: "bash",
        yml: "yaml",
        htm: "html",
        cplusplus: "cpp",
        csharp: "csharp",
        cs: "csharp",
        md: "markdown"
      };
      return aliases[normalized] || normalized;
    }

    function detectCodeLanguage(codeText, fallback = "code") {
      const text = codeText || "";
      const trimmed = text.trim();
      if (!trimmed) return fallback || "code";
      if (/^\s*<!doctype\s+html/i.test(text) || /<\/(?:html|body|div|script|style|main|section)>/i.test(text)) return "html";
      if (/^\s*<svg[\s>]/i.test(text)) return "svg";
      if (/^\s*[{[][\s\S]*[}\]]\s*$/.test(text)) return "json";
      if (/^\s*(import|export|const|let|var|function|class)\b/m.test(text)) return "javascript";
      if (/^\s*(def|class|import|from)\s+\w+/m.test(text)) return "python";
      if (/^\s*(SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER)\b/im.test(text)) return "sql";
      if (/^\s*#include\s+[<"]/m.test(text)) return "cpp";
      if (/^\s*package\s+[\w.]+;/m.test(text) || /\bpublic\s+class\s+\w+/m.test(text)) return "java";
      if (/^\s*package\s+\w+/m.test(text) && /\bfunc\s+\w+\s*\(/m.test(text)) return "go";
      return fallback || "code";
    }

    function codeTextFromBlock(code) {
      return code.dataset.rawCode || code.textContent || "";
    }

    function highlightedCodeHtml(lang, codeText) {
      const text = String(codeText || "");
      if (!window.hljs) return escapeHtml(text);

      try {
        const normalized = normalizeCodeLanguage(lang);
        if (normalized !== "code" && hljs.getLanguage && hljs.getLanguage(normalized)) {
          return hljs.highlight(text, { language: normalized, ignoreIllegals: true }).value;
        }
        return hljs.highlightAuto(text).value;
      } catch (e) {
        return escapeHtml(text);
      }
    }

    function decorateCodeLines(pre, code, codeText, htmlText = "") {
      const raw = String(codeText || "").replace(/\n$/, "");
      const escaped = htmlText || escapeHtml(raw);
      const lines = raw.split("\n");
      const htmlLines = escaped.replace(/\n$/, "").split("\n");
      code.innerHTML = "";

      lines.forEach((line, index) => {
        const span = document.createElement("span");
        span.className = "code-line";
        span.dataset.line = String(index + 1);
        span.innerHTML = htmlLines[index] || (line ? escapeHtml(line) : " ");
        code.appendChild(span);
      });

      pre.classList.toggle("code-tall", lines.length > 24);
      return lines.length;
    }

    function isRenderableCode(lang, codeText) {
      const normalized = normalizeCodeLanguage(lang);
      if (["html", "htm", "svg", "xml", "markdown", "md"].includes(normalized)) return true;
      return /^\s*<(?:!doctype\s+html|html|head|body|main|section|article|div|style|script|svg)\b/i.test(codeText || "");
    }

    function buildPreviewDocument(lang, codeText) {
      const normalized = normalizeCodeLanguage(lang);
      const text = codeText || "";

      if (normalized === "svg") {
        return "<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><style>html,body{margin:0;min-height:100%;display:grid;place-items:center;background:#f6f4ee}svg{max-width:100%;max-height:100vh}</style></head><body>" + text + "</body></html>";
      }

      if (normalized === "markdown" || normalized === "md") {
        const body = window.marked && marked.parse
          ? marked.parse(text)
          : escapeHtml(text).replace(/\n/g, "<br>");
        return "<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><style>body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6;color:#24201a;background:#fbfaf7}pre{overflow:auto;padding:14px;background:#111;color:#eee;border-radius:10px}code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}img{max-width:100%}</style></head><body>" + body + "</body></html>";
      }

      if (/^\s*<!doctype\s+html/i.test(text) || /^\s*<html[\s>]/i.test(text)) {
        return text;
      }

      return "<!doctype html><html><head><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"><style>body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#24201a;background:#fbfaf7}img,video,canvas,svg{max-width:100%}</style></head><body>" + text + "</body></html>";
    }

    function openCodePreview(lang, codeText) {

          const line = e.target.closest(".code-line");

          code.querySelectorAll(".active-line").forEach(el => el.classList.remove("active-line"));
          line.classList.add("active-line");

        previewBtn.addEventListener("click", () => {
          const text = codeTextFromBlock(code);
          openCodePreview(lang, text);
        });

        copyBtn.addEventListener("click", async () => {
          const text = codeTextFromBlock(code);

          try {
            await navigator.clipboard.writeText(text);
            copyBtn.textContent = "已复制";
            setTimeout(() => copyBtn.textContent = "复制", 1200);
          } catch (e) {
            // 安卓某些浏览器不允许 clipboard API，使用兜底方案
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();

            try {
              document.execCommand("copy");
              copyBtn.textContent = "已复制";
            } catch (_) {
              copyBtn.textContent = "失败";
            }

            document.body.removeChild(ta);
            setTimeout(() => copyBtn.textContent = "复制", 1200);
          }
        });
      });
    }

    function renderMath(root) {
      if (window.MathJax && MathJax.typesetPromise) {
        // 先标记数学公式容器，避免渲染后高度突变导致页面跳动
        const mathElements = root.querySelectorAll('mjx-container');
        mathElements.forEach(el => {
          if (!el.style.minHeight) {
            el.style.minHeight = el.offsetHeight ? el.offsetHeight + 'px' : '1.5em';
          }
        });

        const run = () => {
          const scrollBefore = getScrollTop();
          const heightBefore = getPageHeight();

          MathJax.typesetPromise([root]).then(() => {
            // 渲染完成后，如果用户不在底部，保持滚动位置
            const heightAfter = getPageHeight();
            const heightDiff = heightAfter - heightBefore;

            if (heightDiff > 0 && !isNearBottom(AUTO_SCROLL_THRESHOLD + 50)) {
              window.scrollTo({
                top: scrollBefore + heightDiff,
                behavior: 'auto'
              });
            }
          }).catch(() => {});
        };

        if (window.requestIdleCallback) {
          requestIdleCallback(run, { timeout: 1200 });
        } else {
          setTimeout(run, 0);
        }
      } else {
        root.innerHTML = root.innerHTML
          .replace(/\$\$([\s\S]*?)\$\$/g, (_, inner) => `<span class="math-display-fallback">${escapeHtml(inner.trim())}</span>`)
          .replace(/\\\(([\s\S]*?)\\\)/g, (_, inner) => `<span class="math-inline-fallback">${escapeHtml(inner.trim())}</span>`);
      }
    }

    function configureMarked() {
      if (!window.marked || !marked.parse || marked._claudeWebConfigured) return;

      const renderer = new marked.Renderer();
      const originalLink = renderer.link.bind(renderer);
      renderer.link = (href, title, text) => {
        const html = originalLink(href, title, text);
        return html.replace("<a ", '<a target="_blank" rel="noopener noreferrer" ');
      };

      marked.setOptions({
        gfm: true,
        breaks: true,
        mangle: false,
        headerIds: false,
        renderer
      });

      marked._claudeWebConfigured = true;
    }

    function renderMarkdown(text) {
      const normalized = normalizeMathDelimiters(text || "");
      const protectedMath = protectMathForMarkdown(normalized);
      if (window.marked && marked.parse) {
        configureMarked();
        return restoreMarkdownMath(marked.parse(protectedMath.text), protectedMath.blocks);
      }
      return restoreMarkdownMath(escapeHtml(protectedMath.text).replace(/\n/g, "<br>"), protectedMath.blocks);
    }

    function markSearchHits(root, keyword) {
      const kw = (keyword || "").trim();
      if (!root || !kw) return;
      const pattern = new RegExp(escapeRegExp(kw), "ig");
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          const parent = node.parentElement;
          if (!parent || /^(SCRIPT|STYLE|TEXTAREA|INPUT|CODE|PRE|MARK)$/i.test(parent.tagName)) {
            return NodeFilter.FILTER_REJECT;
          }
          return pattern.test(node.nodeValue || "") ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        }
      });
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(node => {
        const text = node.nodeValue || "";
        pattern.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let last = 0;
        let match;
        while ((match = pattern.exec(text))) {
          if (match.index > last) frag.appendChild(document.createTextNode(text.slice(last, match.index)));
          const mark = document.createElement("mark");
          mark.className = "search-hit-mark";
          mark.textContent = match[0];
          frag.appendChild(mark);
          last = match.index + match[0].length;
        }
        if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
        node.parentNode.replaceChild(frag, node);
      });
    }

    }

    function renderToolStatusesHtml() {
      if (!activeToolStatuses.length) return "";

      const searchStatuses = ["parsing", "planning_search", "searching", "reading_sources"];
      let searchStatus = "";
      for (let i = searchStatuses.length - 1; i >= 0; i--) {
        if (visibleStatuses.includes(searchStatuses[i])) {
          searchStatus = searchStatuses[i];
          break;
        }
      }
      const compactStatuses = searchStatus
        ? [searchStatus]

      if (!compactStatuses.length) return "";
      return compactStatuses.map(key => {

      const linesByPhase = {
        parsing: "正在读取可用信息…",
        planning: "正在判断是否需要补充外部信息…",
        searching: "正在检索更可靠的来源…",
        starting: "正在理解你的问题…",
        shaping: "正在整理思路…",
        answering_with_sources: "正在根据来源组织回答…",
        polishing: "正在收束表达…"
      };

      const pool = linesByInput[inputType] || linesByInput.general;
      const phaseText = linesByPhase[phase] || linesByPhase.starting;
      const indexSeed = Math.abs(hashPrompt(prompt + "|" + inputType + "|" + phase));
      const stepText = pool[indexSeed % pool.length];
      const detailText = phase === "searching"
        ? "会优先采用更可靠、更新的外部来源。"
        : phase === "answering_with_sources"
          ? "回答会尽量基于已找到的来源。"
          : "尽量保持简洁、准确、不过度展开。";

      return {
        status: phaseText,
        detail: stepText,
        hint: promptHint,
        meta: inputType === "general" ? "安静思考" : inputType,
        detailText
      };
    }

    function hashPrompt(text) {
      let h = 0;
      for (let i = 0; i < text.length; i++) {
        h = ((h << 5) - h) + text.charCodeAt(i);
        h |= 0;
      }
      return h;
    }

    function getThinkingSteps() {
      const mode = inferThinkingMode();
      const route = selectedThinkingRouteLabel();
      const filePart = thinkingContext.fileCount
        ? `同时纳入 ${thinkingContext.fileCount} 个附件${thinkingContext.fileNames ? "：" + compactPrompt(thinkingContext.fileNames, 42) : ""}`
        : "只基于当前对话与已保留上下文";
      const imagePart = thinkingContext.imageCount
        ? `识别 ${thinkingContext.imageCount} 张图片里的可见信息`
        : filePart;

      if (mode === "web") {
        return [
          makeThinkingStep("检索可靠来源", "保留和问题最相关的外部信息"),
          makeThinkingStep("组织可核查回答", "用少量关键依据支撑结论")
        ];
      }
      if (mode === "math") {
        return [
          makeThinkingStep("列出已知条件", "识别变量、约束、目标量和隐含前提"),
          makeThinkingStep("选择推导路径", "拆成可验证的小步骤，避免跳过关键等式"),
          makeThinkingStep("回代检查结果", "核对单位、边界情况和是否满足原条件")
        ];
      }
      if (mode === "code") {
        return [
          makeThinkingStep("理解代码意图", `${filePart}，先确认入口、调用链和错误现象`),
          makeThinkingStep("定位关键风险", "检查状态变化、边界输入、异步流程和兼容性"),
          makeThinkingStep("形成可执行方案", `按 ${route} 方式返回结论、补丁或排查步骤`)
        ];
      }
      if (mode === "vision") {
        return [
          makeThinkingStep("读取视觉线索", imagePart),
          makeThinkingStep("连接文字需求", "把图片内容和用户问题放在同一判断框架里"),
          makeThinkingStep("给出可用结论", "描述可见事实，明确不确定或需要放大的部分")
        ];
      }
      if (mode === "file") {
        return [
          makeThinkingStep("读取附件结构", filePart),
          makeThinkingStep("提取关键片段", "优先看标题、错误、配置、数据列和重复模式"),
          makeThinkingStep("整理回答框架", "把发现、依据和建议分开呈现")
        ];
      }
      if (mode === "writing") {
        return [
          makeThinkingStep("确认写作目标", "判断受众、语气、长度和必须保留的信息"),
          makeThinkingStep("搭建内容骨架", "先排主次，再处理开头、转折和收束"),
          makeThinkingStep("打磨表达节奏", "压缩空话，保留可读性和行动指向")
        ];
      }
      return [
        makeThinkingStep("拆解问题意图", "识别用户真正要解决的目标、限制和交付形式"),
        makeThinkingStep("选择回答路径", `${filePart}，决定先给结论还是先做分析`),
        makeThinkingStep("校验输出质量", "检查遗漏、歧义、时效性和可执行性")
      ];
    }

    function getThinkingProgressIndex(steps) {
      if (activeToolStatuses.includes("parsing")) return 0;
      if (!streamingTargetContent.trim()) {
        return Math.min(1, steps.length - 1);
      }
      const textLen = streamingTargetContent.trim().length;
      if (textLen < 60) return Math.min(1, steps.length - 1);
      if (textLen < 220) return Math.min(2, steps.length - 1);
      return steps.length - 1;
    }

    function renderThinkingHtml() {
      const variant = getThinkingStateVariant();
      const steps = getThinkingSteps();
      const activeIndex = getThinkingProgressIndex(steps);
      const currentIndex = Math.min(activeIndex, steps.length - 1);
      const summary = `thinking`;
      const detail = escapeHtml(variant.status);
      const chain = steps.map((step, idx) => {
        let cls = "thinking-step";
        if (idx <= activeIndex) cls += " active";
        if (idx === currentIndex) cls += " current";
        return (
          `<div class="${cls}">` +
            `<div>` +
              `<span class="thinking-step-title">${escapeHtml(step.title || step)}</span>` +
              `<span class="thinking-step-detail">${escapeHtml(step.detail || "")}</span>` +
            `</div>` +
          `</div>`
        );
      }).join("");

      return (
        `<div class="thinking">` +
          `<div class="thinking-shell">` +
            `<div class="thinking-panel" data-thinking-panel>` +
              `<div class="thinking-summary"><span class="thinking-status">` + detail + `</span><span class="quiet">` + summary + `</span></div>` +
              `<div class="thinking-meta">` +
                `<span class="thinking-toggle">展开思路</span>` +
              `</div>` +
              `<div class="thinking-chain">${chain}</div>` +
            `</div>` +
          `</div>` +
        `</div>`
      );
    }

    function stripStreamingStatusMarkers(text) {
      const nextStatuses = [];
      const withoutSources = String(text || "").replace(STREAM_SOURCES_RE, (_, raw) => {
        try {
          const parsed = JSON.parse(raw);
          activeStreamingSources = Array.isArray(parsed) ? parsed : [];
        } catch (e) {}
        return "";
      });
      const cleaned = withoutSources.replace(STREAM_STATUS_RE, (_, name) => {
        const key = String(name || "").trim().toLowerCase();
        if (key && !nextStatuses.includes(key)) nextStatuses.push(key);
        return "";
      });
      activeToolStatuses = nextStatuses;
      return cleaned.replace(/^\s+/, "");
    }

    function injectCitationMarkers(root, sources) {
      if (!root || !sources || !sources.length) return;

      const sourceMap = new Map();
      sources.forEach(source => {
        const index = Number(source.index);
        if (index > 0) sourceMap.set(String(index), source);
      });

      const skipTags = new Set(["A", "CODE", "PRE", "SCRIPT", "STYLE", "TEXTAREA"]);
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const nodes = [];

      while (walker.nextNode()) {
        const node = walker.currentNode;
        const parent = node.parentElement;
        if (!parent) continue;
        if (skipTags.has(parent.tagName)) continue;
        if (parent.closest(".sources-strip")) continue;
        if (!/\[\d+\]/.test(node.nodeValue || "")) continue;
        nodes.push(node);
      }

      nodes.forEach(node => {
        const text = node.nodeValue || "";
        const frag = document.createDocumentFragment();
        let lastIndex = 0;
        const re = /\[(\d+)\]/g;
        let match;

        while ((match = re.exec(text))) {
          const raw = match[0];
          const idx = match[1];
          const source = sourceMap.get(idx);
          if (!source) continue;

          if (match.index > lastIndex) {
            frag.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
          }

          const btn = document.createElement("a");
          btn.className = "source-citation";
          btn.textContent = idx;
          btn.href = source.url || "#";
          btn.target = "_blank";
          btn.rel = "noopener noreferrer";
          btn.dataset.sourceIndex = idx;
          btn.setAttribute("aria-label", "查看来源 " + idx);
          frag.appendChild(btn);
          lastIndex = match.index + raw.length;
        }

        if (lastIndex === 0) return;
        if (lastIndex < text.length) {
          frag.appendChild(document.createTextNode(text.slice(lastIndex)));
        }
        node.parentNode.replaceChild(frag, node);
      });
    }

    function parseImagePreviewList(value) {
      if (!value) return [];

      if (Array.isArray(value)) return value;

      if (typeof value === "string") {
        const v = value.trim();

        if (!v) return [];

        try {
          const parsed = JSON.parse(v);
          if (Array.isArray(parsed)) return parsed;
        } catch (e) {}

        return [v];
      }

      return [];
    }

    function getMessageId(msg) {
      return msg && msg.id !== undefined && msg.id !== null ? String(msg.id) : "";
    }

    function isThinkingMessage(msg) {
      return (msg && (msg.content || "").trim()) === "思考中...";
    }

    function messageHasCopyableText(msg) {
      return !!((msg && msg.content) || "").trim() && !isThinkingMessage(msg);
    }

    function makeMessageButton(className, title, text, msg, idx) {
      const btn = document.createElement("button");
      btn.className = "small-btn " + className;
      btn.type = "button";
      btn.title = title;
      btn.textContent = text;
      btn.dataset.msgId = getMessageId(msg);
      btn.dataset.idx = String(idx);

    }

    function makeMessageFoldButton(msg, idx) {
      const btn = document.createElement("button");
      btn.className = "message-fold-btn";
      btn.type = "button";
      btn.dataset.msgId = getMessageId(msg) || ("idx:" + idx);
      btn.dataset.idx = String(idx);
      btn.textContent = "展开全文";
      btn.hidden = true;
      return btn;
    }

    function updateMessageFoldButton(btn, collapsed) {
      if (!btn) return;
      btn.textContent = collapsed ? "展开全文" : "折叠全文";
      btn.title = collapsed ? "展开这条长消息" : "折叠这条长消息";
    }

    function applyMessageCollapse(wrap, forceCheck = false) {
      if (!wrap) return;

      const bubble = wrap.querySelector(".bubble");
      const foldBtn = wrap.querySelector(".message-fold-btn");
      if (!bubble || !foldBtn || bubble.querySelector(".thinking")) return;

      const key = wrap.dataset.msgId || foldBtn.dataset.msgId || foldBtn.dataset.idx || "";
      const isLong = forceCheck || longMessageKeys.has(key) || bubble.scrollHeight > 380;
      if (!isLong) return;

      longMessageKeys.add(key);
      foldBtn.hidden = false;

      if (wrap.classList.contains("user") && !collapsedMessageKeys.has(key) && !bubble.dataset.userExpanded) {
        collapsedMessageKeys.add(key);
      }

      const collapsed = collapsedMessageKeys.has(key);
      bubble.classList.toggle("message-collapsed", collapsed);
      updateMessageFoldButton(foldBtn, collapsed);
    }

    function bindThinkingPanel(panel) {
      if (!panel || panel.dataset.bound) return;
      panel.dataset.bound = "1";
      panel.addEventListener("click", () => {
        panel.classList.toggle("open");
      });
    }

    function bindThinkingPanels(root) {
      if (!root) return;
      root.querySelectorAll("[data-thinking-panel]").forEach(bindThinkingPanel);
    }

    function createMessageElement(msg, idx, lightweight = false) {
      const wrap = document.createElement("div");
      wrap.className = "msg-wrap " + msg.role;
      if (msg.supersededBy) {
        wrap.classList.add("superseded-msg");
        wrap.dataset.supersededBy = msg.supersededBy;
      }
      wrap.dataset.msgId = getMessageId(msg);
      if (!wrap.dataset.msgId) wrap.dataset.msgId = "idx:" + idx;

      const row = document.createElement("div");
      row.className = "msg " + msg.role;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (msg.role === "assistant") {
        if ((msg.content || "").trim() === "思考中...") {
          bubble.innerHTML = renderThinkingHtml();
          bindThinkingPanels(bubble);
        } else {
          const sources = parseMessageSources(msg.sources);
          const cleanContent = stripStreamingStatusMarkers(msg.content || "");
          bubble.innerHTML = renderToolStatusesHtml() + renderMarkdown(cleanContent);
          injectCitationMarkers(bubble, sources);
          bubble.insertAdjacentHTML("beforeend", renderSourcesStrip(sources));

          if (!lightweight) {
            enhanceRichText(bubble);
            enhanceCodeBlocks(bubble);
            renderMath(bubble);
          }

          if (msg.model || msg.providerName) {
            const meta = document.createElement("div");
            meta.className = "answer-meta";
            let metaText = (msg.providerName || "未知接入商") + " · " + (msg.model || "未知模型");
            if (msg.tokenCount) {
              metaText += " · 约 " + msg.tokenCount + " tokens";
            }
            meta.textContent = metaText;
            bubble.appendChild(meta);
          }
        }
      } else {
        let html = escapeHtml(msg.content || "").replace(/\n/g, "<br>");
        if (msg.fileName && !msg.imagePreview) {
          html += `<div class="file-chip">${escapeHtml(msg.fileName)}</div>`;
        }

        const imgs = parseImagePreviewList(msg.imagePreview);
        if (imgs.length) {
          html += '<div class="user-upload">';
          imgs.forEach(src => {
            html += `<img src="${escapeHtml(src)}" />`;
          });
          html += '</div>';
        }

        bubble.innerHTML = html || " ";
      }

      if (pendingSearchKeyword && getMessageId(msg) === String(pendingJumpMessageId || "")) {
        markSearchHits(bubble, pendingSearchKeyword);
      }

      row.appendChild(bubble);
      wrap.appendChild(row);

      if (!isThinkingMessage(msg)) {
        const foldBar = document.createElement("div");
        foldBar.className = "message-fold-bar";
        foldBar.appendChild(makeMessageFoldButton(msg, idx));
        wrap.appendChild(foldBar);
      }

      const actions = document.createElement("div");
      actions.className = "msg-actions";

      actions.appendChild(makeMessageButton("delete-msg", "删除这条及之后消息", "⌫", msg, idx));
      if (messageHasCopyableText(msg)) {
        actions.appendChild(makeMessageButton("copy-msg", "复制消息", "📋", msg, idx));
      }
      if (msg.role === "assistant" && getMessageId(msg) && !isThinkingMessage(msg)) {
        actions.appendChild(makeMessageButton("regen-msg", "重新回答", "↻", msg, idx));
      }

      if (msg._versions && msg._versions.length > 0) {
        const versionSection = document.createElement("div");
        versionSection.className = "version-section";

        const toggleBtn = document.createElement("button");
        toggleBtn.className = "version-toggle-btn";
        toggleBtn.type = "button";
        const totalVersions = msg._versions.length + 1;
        toggleBtn.textContent = `历史版本 (${msg._versions.length}) / 共 ${totalVersions} 个`;
        toggleBtn.dataset.openText = `收起版本 (${msg._versions.length}) / 共 ${totalVersions} 个`;
        toggleBtn.dataset.closedText = toggleBtn.textContent;
        toggleBtn.dataset.msgId = getMessageId(msg);
        versionSection.appendChild(toggleBtn);

        const altContainer = document.createElement("div");
        altContainer.className = "alt-versions-container";
        altContainer.hidden = true;

        msg._versions.forEach((alt, altIdx) => {
          const altWrap = document.createElement("div");
          altWrap.className = "alt-version";
          altWrap.dataset.altMsgId = alt.id || "";

          const altHeader = document.createElement("div");
          altHeader.className = "alt-version-header";
          const badge = document.createElement("span");
          badge.className = "alt-version-badge";
          badge.textContent = "v" + (altIdx + 2);
          altHeader.appendChild(badge);

          if (alt.model || alt.providerName) {
            const altMeta = document.createElement("span");
            altMeta.style.cssText = "font-size:11px;color:#8f887d;";
            altMeta.textContent = (alt.providerName || "") + " · " + (alt.model || "");
            altHeader.appendChild(altMeta);
          }

          if (messageHasCopyableText(alt)) {
            altHeader.appendChild(makeMessageButton("copy-msg", "复制历史版本", "📋", alt, -1));
          }

          altWrap.appendChild(altHeader);

          const altBubble = document.createElement("div");
          altBubble.className = "bubble";
          altBubble.innerHTML = renderMarkdown(alt.content || "");
          enhanceRichText(altBubble);
          altWrap.appendChild(altBubble);

          altContainer.appendChild(altWrap);
        });

        versionSection.appendChild(altContainer);
        wrap.appendChild(versionSection);
      }

      wrap.appendChild(actions);
      requestAnimationFrame(() => applyMessageCollapse(wrap));
      return wrap;
    }

    function scheduleMessageEnhancements(jobId) {
      if (!window.requestIdleCallback && !window.requestAnimationFrame) return;

      const run = deadline => {
        if (jobId !== renderMessagesJob) return;

        const bubbles = Array.from(chatList.querySelectorAll(".msg-wrap.assistant .bubble:not([data-enhanced])"));
        const end = deadline && typeof deadline.timeRemaining === "function"
          ? () => deadline.timeRemaining() > 4
          : () => false;

        let processed = 0;
        while (bubbles.length && (processed < 2 || end())) {
          const bubble = bubbles.shift();
          bubble.dataset.enhanced = "1";
          enhanceRichText(bubble);
          enhanceCodeBlocks(bubble);
          renderMath(bubble);
          applyMessageCollapse(bubble.closest(".msg-wrap"));
          processed += 1;
        }

        if (bubbles.length && jobId === renderMessagesJob) {
          if (window.requestIdleCallback) requestIdleCallback(run, { timeout: 800 });
          else requestAnimationFrame(() => run(null));
        }
      };

      if (window.requestIdleCallback) requestIdleCallback(run, { timeout: 800 });
      else requestAnimationFrame(() => run(null));
    }

    function buildVersionChains(msgs) {
      const byId = {};
      msgs.forEach(m => {
        const id = getMessageId(m);
        if (id) byId[id] = m;
        m._versions = [];
      });

      const supersededIds = new Set();
      msgs.forEach(m => {
        const id = getMessageId(m);
        if (id && m.supersededBy) supersededIds.add(id);
      });

      function findLatest(msgId) {
        let current = String(msgId);
        while (byId[current] && byId[current].supersededBy && byId[String(byId[current].supersededBy)]) {
          current = String(byId[current].supersededBy);
        }
        return current;
      }

      const versionGroups = {};
      msgs.forEach(m => {
        const id = getMessageId(m);
        if (id && m.supersededBy) {
          const latestId = findLatest(id);
          if (!versionGroups[latestId]) versionGroups[latestId] = [];
          if (!versionGroups[latestId].some(v => getMessageId(v) === id)) {
            versionGroups[latestId].push(m);
          }
        }
      });

      Object.values(versionGroups).forEach(group => {
        group.sort((a, b) => (a.id || 0) - (b.id || 0));
      });

      msgs.forEach(m => {
        m._versions = versionGroups[getMessageId(m)] || [];
      });

      return msgs.filter(m => !supersededIds.has(getMessageId(m)));
    }

    function getMsgSnapshotKey(msgs) {
      return msgs.map(m => {
        const content = m.content || "";
        const contentSig = content.length + ":" + content.slice(0, 48) + ":" + content.slice(-48);
        return getMessageId(m) + ":" + (m.role || "") + ":" + contentSig + ":" + (m.supersededBy || "") + ":" + (m.sources || "");
      }).join("|");
    }

    function renderMessages(forceScroll = false) {
      const jobId = ++renderMessagesJob;

      if (!messages.length) {
        setWelcomeMode(true);
        renderWelcomeEmpty();
        return;
      }

      setWelcomeMode(false);

      const shouldAutoScroll = forceScroll || autoScrollEnabled;
      const scrollBefore = getScrollTop();
      const heightBefore = getPageHeight();

      const displayMessages = buildVersionChains(messages);
      const newKey = getMsgSnapshotKey(displayMessages);

      // 如果消息没有变化，跳过重新渲染
      if (newKey === lastRenderedMsgKey && chatList.children.length > 0 && !chatList.querySelector(".empty")) {
        if (shouldAutoScroll) {
          scrollToBottomIfNeeded(forceScroll);
        }
        return;
      }
      lastRenderedMsgKey = newKey;

      chatList.innerHTML = "";

      const fragment = document.createDocumentFragment();
      displayMessages.forEach((msg, idx) => {
        fragment.appendChild(createMessageElement(msg, idx, true));
      });
      chatList.appendChild(fragment);
      scheduleMessageEnhancements(jobId);

      if (shouldAutoScroll) {
        scrollToBottomIfNeeded(forceScroll);
      } else {
        // 保持滚动位置：补偿高度差异
        const heightAfter = getPageHeight();
        const heightDiff = heightAfter - heightBefore;
        if (Math.abs(heightDiff) > 5) {
          restoreScrollPosition(scrollBefore);
        }
      }
    }



    // ============================================================
    // 流式输出性能优化：
    // 不再每个 chunk 重绘整个聊天列表，只更新最后一个 assistant bubble。
    // 这样可以显著降低手机端 DOM 重建、Markdown 渲染和滚动抖动。
    // ============================================================
    let streamingRenderQueued = false;
    let pendingStreamingContent = "";
    let lastStreamingRenderTime = 0;
    const STREAMING_RENDER_THROTTLE = 16; // 接近 60fps，优先更快把新内容画出来
    let streamingDisplayContent = "";
    let streamingTargetContent = "";
    let streamingStableContent = "";
    let streamingPendingContent = "";
    let streamingFullContent = "";
    let streamingTypewriterTimer = null;
    let streamingScheduleSeq = 0;
    let isAssistantTyping = false;
    let thinkingMotionTimer = null;
    function getLastAssistantBubble() {
      const assistantWraps = chatList.querySelectorAll(".msg-wrap.assistant");
      if (!assistantWraps.length) return null;

      const lastWrap = assistantWraps[assistantWraps.length - 1];
      return lastWrap.querySelector(".bubble");
    }

    function getLastAssistantMessage() {
      for (let i = messages.length - 1; i >= 0; i--) {
        if (messages[i] && messages[i].role === "assistant") return messages[i];
      }
      return null;
    }

    function renderStreamingPlainText(text) {
      return `<div class="streaming-plain-text">${escapeHtml(text || "")}</div>`;
    }

    function isCodeFenceClosed(text) {
      const matches = String(text || "").match(/```/g) || [];
      return matches.length % 2 === 0;
    }

    function isMathClosed(text) {
      const source = String(text || "").replace(/\\\$/g, "");
      const blockMatches = source.match(/\$\$/g) || [];
      if (blockMatches.length % 2 !== 0) return false;

      const withoutBlocks = source.replace(/\$\$[\s\S]*?\$\$/g, "");
      const inlineMatches = withoutBlocks.match(/(?<!\$)\$(?!\$)/g) || [];
      return inlineMatches.length % 2 === 0;
    }

    function looksLikeIncompleteTable(text) {
      const recent = String(text || "").split("\n").slice(-6);
      const tableLikeLines = recent.filter(line => line.includes("|"));
      if (tableLikeLines.length < 2) return false;
      return !recent.some(line =>
        /^\s*\|?(?:\s*:?-{3,}:?\s*\|)+\s*:?-{3,}:?\s*\|?\s*$/.test(line)
      );
    }

    function isSafeStableSegment(text) {
      const source = String(text || "");
      if (!source.trim()) return true;
      if (!isCodeFenceClosed(source)) return false;
      if (!isMathClosed(source)) return false;
      if (looksLikeIncompleteTable(source)) return false;
      return true;
    }

    function findLastSentenceBoundary(text) {
      const re = /[。？！.!?]/g;
      let last = -1;
      let match;
      while ((match = re.exec(text)) !== null) {
        last = match.index + match[0].length;
      }
      return last;
    }

    function splitStableSegment(buffer) {
      const source = String(buffer || "");
      if (!source) return { stable: "", pending: "" };

      const paragraphBoundary = source.lastIndexOf("\n\n");
      if (paragraphBoundary >= 0) {
        const candidate = source.slice(0, paragraphBoundary + 2);
        if (isSafeStableSegment(candidate)) {
          return {
            stable: candidate,
            pending: source.slice(paragraphBoundary + 2)
          };
        }
      }

      const sentenceBoundary = findLastSentenceBoundary(source);
      if (sentenceBoundary > 0) {
        const candidate = source.slice(0, sentenceBoundary);
        if (isSafeStableSegment(candidate)) {
          return {
            stable: candidate,
            pending: source.slice(sentenceBoundary)
          };
        }
      }

      return {
        stable: "",
        pending: source
      };
    }

    function buildStreamingRenderContent() {
      return (streamingStableContent || "") + (streamingDisplayContent || "");
    }

    function renderAssistantContentIntoBubble(bubble, content, finalRender = false, showCaret = false) {
      if (!bubble) return false;

      const text = stripStreamingStatusMarkers(content || "");
      const lastAssistantMsg = getLastAssistantMessage();
      const savedSources = lastAssistantMsg ? parseMessageSources(lastAssistantMsg.sources) : [];
      const sources = activeStreamingSources.length ? activeStreamingSources : savedSources;

      if (text.trim() === "思考中...") {
        if (!bubble.querySelector(".thinking")) {
          bubble.innerHTML = renderThinkingHtml();
        }
        bindThinkingPanels(bubble);
        return true;
      }

      // 保存当前滚动位置和页面高度
      const scrollBefore = getScrollTop();
      const heightBefore = getPageHeight();
      const wasNearBottom = isNearBottom(AUTO_SCROLL_THRESHOLD);

      const stableText = stripStreamingStatusMarkers(streamingStableContent || "");
      const pendingText = stripStreamingStatusMarkers(streamingDisplayContent || "");
      const hasStreamingBuffers = !finalRender && (stableText || pendingText);

      let contentHtml = "";
      if (finalRender) {
        contentHtml = renderMarkdown(text);
      } else if (hasStreamingBuffers) {
        contentHtml =
          (stableText ? renderMarkdown(stableText) : "") +
          (pendingText ? renderStreamingPlainText(pendingText) : "");
      } else {
        contentHtml = renderStreamingPlainText(text);
      }
      bubble.innerHTML = (finalRender ? "" : renderThinkingHtml()) + renderToolStatusesHtml() + contentHtml;
      if (!finalRender) bindThinkingPanels(bubble);
      injectCitationMarkers(bubble, sources);
      bubble.insertAdjacentHTML("beforeend", renderSourcesStrip(sources));

      if (showCaret && text.trim() && text.trim() !== "思考中...") {
        const caret = document.createElement("span");
        caret.className = "stream-caret";
        bubble.appendChild(caret);
      }

      if (finalRender) {
        enhanceRichText(bubble);
        enhanceCodeBlocks(bubble);
        renderMath(bubble);
        applyMessageCollapse(bubble.closest(".msg-wrap"), true);
      }

      // 渲染后，如果用户不在底部且内容高度变化了，保持滚动位置
      const heightAfter = getPageHeight();
      const heightDiff = heightAfter - heightBefore;

      if (!wasNearBottom && heightDiff > 0 && Math.abs(heightDiff) > 5) {
        requestAnimationFrame(() => {
          window.scrollTo({
            top: scrollBefore,
            behavior: 'auto'
          });
        });
      }

      return true;
    }

    function stopThinkingMotion() {
      if (thinkingMotionTimer) {
        clearInterval(thinkingMotionTimer);
        thinkingMotionTimer = null;
      }
    }

    function ensureThinkingMotion() {
      if (thinkingMotionTimer) return;
      thinkingMotionTimer = setInterval(() => {
        const bubble = getLastAssistantBubble();
        if (!bubble) return;
        const rawContent = messages.length ? (messages[messages.length - 1].content || "") : "思考中...";
        if ((rawContent || "").trim() === "思考中...") {
          renderAssistantContentIntoBubble(bubble, rawContent, false, false);
          return;
        }
        if (!streamingTargetContent && !isAssistantTyping) {
          stopThinkingMotion();
        }
      }, 1100);
    }

    function followBottomDuringStreaming() {
      // 只有在自动滚动启用且用户在底部附近时才跟随
      if (!autoScrollEnabled || userScrollActive) return;

      // 使用单次 RAF 保持流畅性，避免过度滚动
      requestAnimationFrame(() => {
        if (isNearBottom(AUTO_SCROLL_THRESHOLD + 100)) {
          const targetScroll = getPageHeight();
          window.scrollTo({
            top: targetScroll,
            behavior: "auto"
          });
        }
      });
    }

    function updateLastAssistantBubble(content, finalRender = false, showCaret = false) {
      const bubble = getLastAssistantBubble();

      // 如果找不到最后一个 assistant bubble，说明 DOM 状态不完整，退回全量渲染。
      if (!bubble) {
        // 标记需要重新渲染，避免缓存的 key 阻止渲染
        lastRenderedMsgKey = "";
        renderMessages();
        return false;
      }

      renderAssistantContentIntoBubble(bubble, content, finalRender, showCaret);
      bindThinkingPanels(bubble);
      followBottomDuringStreaming();
      return true;
    }

    function stopStreamingTypewriter(finalRender = false) {
      if (streamingTypewriterTimer) {
        clearTimeout(streamingTypewriterTimer);
        streamingTypewriterTimer = null;
      }

      isAssistantTyping = false;
      stopThinkingMotion();

      if (finalRender) {
        streamingDisplayContent = streamingTargetContent || streamingDisplayContent;
      }
    }

    function isCjkChar(ch) {
      return /[\u3400-\u9fff\uf900-\ufaff]/.test(ch || "");
    }

    function isWhitespace(ch) {
      return /\s/.test(ch || "");
    }

    function isAsciiWordChar(ch) {
      return /[A-Za-z0-9]/.test(ch || "");
    }

    function isSoftPunctuation(ch) {
      return /[,:;，、：；]/.test(ch || "");
    }

    function isHardPunctuation(ch) {
      return /[.!?。！？]/.test(ch || "");
    }

    function isLineBreak(ch) {
      return ch === "\n";
    }

    function getTypewriterBurstSize(remaining) {
      if (remaining > 900) return 28;
      if (remaining > 480) return 18;
      if (remaining > 220) return 12;
      if (remaining > 80) return 7;
      return 3;
    }

    function getNextTypewriterSlice() {
      const start = streamingDisplayContent.length;
      const source = streamingTargetContent;

      if (start >= source.length) {
        return { nextText: streamingDisplayContent, delay: 0 };
      }

      let end = start;
      const burstSize = getTypewriterBurstSize(source.length - start);
      let units = 0;

      while (end < source.length && units < burstSize) {
        const first = source[end];

        if (isLineBreak(first)) {
          end += 1;
          units += 2;
          break;
        }

        if (isWhitespace(first)) {
          while (end < source.length && isWhitespace(source[end])) end += 1;
          units += 1;
          continue;
        }

        if (isCjkChar(first)) {
          end += 1;
          units += 1;
          continue;
        }

        if (isAsciiWordChar(first)) {
          while (end < source.length && isAsciiWordChar(source[end])) end += 1;
          units += 2;
          continue;
        }

        end += 1;
        units += 1;

        if (isHardPunctuation(first)) break;
      }

      const chunk = source.slice(start, end);
      const last = chunk[chunk.length - 1] || "";

      let delay = 2;
      if (isLineBreak(last)) delay = 12;
      else if (isWhitespace(last)) delay = 1;
      else if (isCjkChar(last)) delay = 3;
      else if (isAsciiWordChar(last)) delay = 4;
      else if (isSoftPunctuation(last)) delay = 6;
      else if (isHardPunctuation(last)) delay = 10;

      return {
        nextText: source.slice(0, end),
        delay
      };
    }

    function tickStreamingTypewriter() {
      streamingTypewriterTimer = null;

      if (!isAssistantTyping) return;

      const remaining = streamingTargetContent.length - streamingDisplayContent.length;
      if (remaining <= 0) {
        updateLastAssistantBubble(buildStreamingRenderContent(), false, true);
        return;
      }

      const next = getNextTypewriterSlice();
      streamingDisplayContent = next.nextText;

      updateLastAssistantBubble(buildStreamingRenderContent(), false, true);

      if (streamingDisplayContent.length < streamingTargetContent.length) {
        streamingTypewriterTimer = setTimeout(tickStreamingTypewriter, next.delay);
      }
    }

    function ensureStreamingTypewriter() {
      if (!isAssistantTyping) {
        isAssistantTyping = true;
      }

      if (streamingTypewriterTimer) return;
      streamingTypewriterTimer = setTimeout(tickStreamingTypewriter, 0);
    }

    function beginStreamingAssistantMessage() {
      stopStreamingTypewriter(false);
      streamingScheduleSeq += 1;
      pendingStreamingContent = "";
      streamingDisplayContent = "";
      streamingTargetContent = "";
      streamingStableContent = "";
      streamingPendingContent = "";
      streamingFullContent = "";
      activeToolStatuses = [];
      activeStreamingSources = [];
      lastStreamingRenderTime = 0;
      ensureThinkingMotion();
    }

    function commitStreamingFrame(text) {
      pendingStreamingContent = "";
      const incoming = String(text || "");
      streamingFullContent = incoming;
      streamingPendingContent = incoming.slice(streamingStableContent.length);

      const split = splitStableSegment(streamingPendingContent);
      if (split.stable) {
        streamingStableContent += split.stable;
      }
      streamingPendingContent = split.pending;
      streamingTargetContent = streamingPendingContent;
      streamingDisplayContent = "";
      if (messages.length && messages[messages.length - 1].role === "assistant") {
        messages[messages.length - 1].content = incoming;
      }
      ensureStreamingTypewriter();
    }

    function setThinkingContextFromInput(text, files, options = {}) {
      const list = files ? Array.from(files) : [];
      thinkingContext = {
        prompt: text || "",
        fileCount: list.length,
        imageCount: list.filter(f => f.type && f.type.startsWith("image/")).length,
        fileNames: list.map(f => f.name).join(", "),
        regenerate: !!options.regenerate
      };
    }

    function scheduleStreamingAssistantUpdate(content) {
      pendingStreamingContent = content || "";
      const seq = streamingScheduleSeq;

      if (streamingRenderQueued) return;

      const now = Date.now();
      const timeSinceLastRender = now - lastStreamingRenderTime;

      // 如果距离上次渲染时间太短，延迟渲染以减少 DOM 操作频率
      if (timeSinceLastRender < STREAMING_RENDER_THROTTLE) {
        streamingRenderQueued = true;
        setTimeout(() => {
          streamingRenderQueued = false;
          if (seq !== streamingScheduleSeq) return;
          lastStreamingRenderTime = Date.now();
          commitStreamingFrame(pendingStreamingContent);
        }, STREAMING_RENDER_THROTTLE - timeSinceLastRender);
        return;
      }

      streamingRenderQueued = true;
      lastStreamingRenderTime = now;

      requestAnimationFrame(() => {
        streamingRenderQueued = false;
        if (seq !== streamingScheduleSeq) return;
        const text = pendingStreamingContent;
        lastStreamingRenderTime = Date.now();
        commitStreamingFrame(text);
      });
    }

    function flushStreamingAssistantUpdate(finalRender = true) {
      streamingScheduleSeq += 1;
      streamingRenderQueued = false;
      const text = pendingStreamingContent || (messages.length ? (messages[messages.length - 1].content || "") : "");
      pendingStreamingContent = "";
      streamingFullContent = String(text || "");
      streamingPendingContent = streamingFullContent.slice(streamingStableContent.length);
      if (streamingPendingContent) {
        streamingStableContent += streamingPendingContent;
      }
      streamingPendingContent = "";
      streamingTargetContent = "";
      streamingDisplayContent = "";
      if (messages.length && messages[messages.length - 1].role === "assistant") {
        messages[messages.length - 1].content = text;
      }
      stopStreamingTypewriter(finalRender);
      updateLastAssistantBubble(streamingStableContent, finalRender, false);
    }

    function showLoadError(message) {
      chatList.innerHTML =
        '<div class="empty">' +

        '<button class="empty-retry" type="button" id="retryLoadBtn">重试</button>' +
        '</div>';

      const retry = $("retryLoadBtn");
      if (retry) retry.onclick = initPage;

      chatList.innerHTML = '<div class="empty">加载对话中...</div>';
      topTitle.textContent = conversation.title || "Claude Web";
      renderSessions();

      try {
        await new Promise(resolve => requestAnimationFrame(resolve));
        await loadMessages();

        showLoadError(e.message || String(e));
      }
