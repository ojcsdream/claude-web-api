<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Claude Web</title>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],
        processEscapes: true
      },
      chtml: {
        scale: 1.02,
        matchFontHeight: false
      },
      startup: { typeset: false }
    };
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #1f1f1d;
      color: #f0ece3;
      font-family: ui-serif, Georgia, "Times New Roman", "Songti SC", "Noto Serif CJK SC", serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: rgba(31,31,29,0.96);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .menu-btn {
      width: 42px;
      height: 42px;
      border: 0;
      background: transparent;
      color: #d8d3c8;
      font-size: 28px;
      border-radius: 10px;
    }

    .title {
      flex: 1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 18px;
      font-weight: 750;
      color: #eee8dc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .share-btn {
      height: 40px;
      padding: 0 16px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,0.14);
      background: transparent;
      color: #f0ece3;
      font-size: 14px;
      font-weight: 650;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 86px 18px 260px;
    }

    #chatList {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .empty {
      color: #8f887d;
      text-align: center;
      padding-top: 30vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .empty-retry {
      margin-top: 14px;
      height: 38px;
      padding: 0 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #11110f;
      color: #f0ece3;
      font-size: 14px;
      font-weight: 650;
    }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-wrap.user {
      align-items: flex-end;
    }

    .msg-wrap.assistant {
      align-items: flex-start;
    }

    .msg {
      width: 100%;
      display: flex;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .msg.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 94%;
      word-break: break-word;
      overflow-x: auto;
    }

    .user .bubble {
      max-width: min(80%, 540px);
      background: #11110f;
      color: #f5f1e8;
      border-radius: 18px;
      padding: 12px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 16px;
      line-height: 1.55;
    }

    .assistant .bubble {
      color: #eee9df;
      font-size: 17px;
      line-height: 1.68;
      max-width: 100%;
    }

    @media (max-width: 760px) {
      .assistant .bubble {
        font-size: 16px;
        line-height: 1.62;
        max-width: 100%;
      }

      .assistant .bubble p {
        margin: 0.24em 0;
      }

      #chatList {
        gap: 16px;
      }
    }


    .assistant .bubble p {
      margin: 0.28em 0;
    }

    .assistant .bubble pre {
      background: #111110;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 12px;
      overflow-x: auto;
      font-size: 13px;
    }

    .answer-meta {
      margin-top: 8px;
      color: #8f887d;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      opacity: 0.8;
    }

    .answer-meta::before {
      content: "使用 ";
      opacity: 0.65;
    }

    .msg-actions {
      display: flex;
      gap: 6px;
      opacity: 0.55;
      padding: 2px 0;
    }

    .msg-wrap.user .msg-actions {
      align-self: flex-end;
      padding-right: 4px;
    }

    .msg-wrap.assistant .msg-actions {
      align-self: flex-start;
    }

    .small-btn {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      color: #aaa397;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      padding: 0;
    }

    .thinking {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .thinking span {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #f5ead8;
      opacity: 0.55;
      animation: dot 1.2s infinite ease-in-out;
    }

    .thinking span:nth-child(2) { animation-delay: 0.15s; }
    .thinking span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dot {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    mjx-container {
      color: #f4efe6 !important;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
    }

    mjx-container[display="true"] {
      display: block;
      text-align: center;
      margin: 1em 0 !important;
      padding: 0.35em 0.1em;
    }

    .composer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 25;
      padding: 10px 12px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(31,31,29,0), rgba(31,31,29,0.92) 20%, rgba(31,31,29,0.98));
    }

    .composer-inner {
      max-width: 760px;
      margin: 0 auto;
      background: #2f2f2c;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 26px;
      padding: 10px 10px 8px;
    }

    textarea {
      width: 100%;
      min-height: 46px;
      max-height: 160px;
      border: 0;
      background: transparent;
      color: #f0ece3;
      padding: 8px 10px;
      resize: none;
      outline: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 17px;
      line-height: 1.4;
    }

    .file-info {
      color: #9fb7e8;
      font-size: 12px;
      padding: 0 8px 4px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .preview img {
      max-width: 68px;
      max-height: 68px;
      border-radius: 10px;
      margin: 4px;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 4px;
    }

    .plus-btn {
      width: 40px;
      height: 40px;
      border: 0;
      background: transparent;
      color: #d8d3c8;
      font-size: 30px;
      border-radius: 999px;
    }

    #fileInput {
      display: none;
    }

    .model-pill {
      flex: 1;
      text-align: center;
      background: transparent;
      border: 0;
      color: #bdb6aa;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 999px;
      background: #ece5d7;
      color: #1f1f1d;
      font-size: 24px;
      font-weight: 800;
    }

    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.42);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: min(90vw, 370px);
      background: #24231f;
      z-index: 90;
      transform: translateX(-105%);
      transition: transform 0.22s;
      padding: 14px 12px 24px;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      padding: 4px 2px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .drawer-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 20px;
      font-weight: 750;
    }

    .drawer-sub {
      margin-top: 4px;
      color: #9c968c;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .close-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.05);
      color: #d8d3c8;
      font-size: 22px;
    }

    .section {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.055);
    }

    .section-title {
      color: #aaa297;
      font-size: 12px;
      margin-bottom: 10px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 750;
      letter-spacing: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title-btn {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      color: #cfc7ba;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .model-choices-collapsed .model-choice:not(.active):not([data-model="custom"]) {
      display: none;
    }

    .session-item, .drawer-btn, .model-choice {
      width: 100%;
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      color: #d8d3c8;
      margin-bottom: 7px;
      padding: 8px 10px;
      text-align: left;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    .session-item.active, .model-choice.active {
      background: rgba(232, 220, 200, 0.14);
      color: #fff7ea;
      border-color: rgba(232, 220, 200, 0.18);
    }

    .session-tools {
      display: grid;
      grid-template-columns: 1fr 42px;
      gap: 7px;
      margin-bottom: 9px;
    }

    .session-search {
      width: 100%;
      height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.16);
      color: #f0ece3;
      padding: 0 11px;
      outline: none;
      font-size: 14px;
    }

    .session-search:focus {
      border-color: rgba(238, 221, 190, 0.38);
    }

    .session-row {
      display: grid;
      grid-template-columns: 1fr 38px;
      gap: 7px;
      align-items: stretch;
      margin-bottom: 6px;
    }

    .session-row .session-item {
      margin-bottom: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pin-btn {
      width: 38px;
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      color: #aaa397;
      font-size: 15px;
      padding: 0;
    }

    .pin-btn.active {
      background: rgba(232, 220, 200, 0.18);
      color: #fff2db;
      border-color: rgba(232, 220, 200, 0.25);
    }

    .session-empty {
      color: #8f887d;
      font-size: 13px;
      padding: 8px 2px 12px;
    }

    .session-list {
      max-height: min(42vh, 360px);
      overflow-y: auto;
      padding-right: 2px;
      margin-bottom: 9px;
    }

    .session-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .session-actions .drawer-btn {
      margin-bottom: 0;
      text-align: center;
      min-height: 36px;
      padding: 7px 8px;
    }

    .new-conv-icon {
      width: 42px;
      min-height: 38px;
      margin-bottom: 0;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      padding: 0;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      color: #9c968c;
      font-size: 12px;
      margin-bottom: 5px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .field input, .field select {
      width: 100%;
      min-height: 40px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,0.10);
      background: #1f1f1d;
      color: #f0ece3;
      padding: 0 10px;
      font-size: 14px;
      outline: none;
    }

    .danger {
      color: #e0a199;
    }
  </style>

<style id="fix-chat-image-size">
  /* 限制聊天区用户上传图片尺寸，防止撑爆页面 */
  .user-upload img,
  .msg-wrap img,
  .bubble img {
    max-width: min(220px, 72vw) !important;
    max-height: 220px !important;
    width: auto !important;
    height: auto !important;
    object-fit: contain !important;
    border-radius: 14px !important;
    display: block !important;
  }

  .user .bubble img {
    max-width: min(180px, 64vw) !important;
    max-height: 180px !important;
  }

  /* 输入框预览图更小 */
  .preview {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    max-height: 86px;
    overflow-y: auto;
    padding: 2px 6px 0;
  }

  .preview img {
    width: 54px !important;
    height: 54px !important;
    max-width: 54px !important;
    max-height: 54px !important;
    object-fit: cover !important;
    border-radius: 10px !important;
    margin: 2px !important;
  }
</style>


<style id="file-cancel-and-fetch-models-style">
  .clear-files-btn {
    display: none;
    margin: 4px 6px 2px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.045);
    color: #cfc7b8;
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .clear-files-btn:active {
    background: rgba(127,29,29,0.18);
    color: #e0a199;
  }

  .fetch-models-status {
    margin: 8px 0;
    color: #9c968c;
    font-size: 12px;
    line-height: 1.5;
    word-break: break-word;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .fetch-models-status.good {
    color: #a7d8a7;
  }

  .fetch-models-status.bad {
    color: #e0a199;
  }

  .fetched-models-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 220px;
    overflow-y: auto;
    margin-top: 8px;
  }

  .fetched-model-btn {
    text-align: left;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: #d8d3c8;
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
    word-break: break-all;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .fetched-model-btn:active {
    background: rgba(255,255,255,0.10);
  }
</style>


<style id="multi-image-preview-style">
  .user-upload {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .user-upload img {
    max-width: 150px !important;
    max-height: 150px !important;
    width: auto !important;
    height: auto !important;
    object-fit: contain !important;
    border-radius: 12px !important;
    border: 1px solid rgba(255,255,255,0.12) !important;
    display: block !important;
  }

  @media (max-width: 640px) {
    .user-upload img {
      max-width: 120px !important;
      max-height: 120px !important;
    }
  }
</style>



  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css" media="print" onload="this.media='all'">

<style id="codeblock-tools-style">
  .assistant .bubble pre {
    position: relative;
    background: #111110 !important;
    border: 1px solid rgba(255,255,255,0.10) !important;
    border-radius: 14px !important;
    padding: 42px 14px 14px !important;
    overflow-x: auto;
    margin: 1em 0;
    max-height: none;
  }

  .assistant .bubble pre.code-collapsed {
    max-height: 92px;
    overflow: hidden;
  }

  .assistant .bubble pre.code-collapsed::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 44px;
    background: linear-gradient(180deg, rgba(17,17,16,0), #111110);
    pointer-events: none;
  }

  .code-toolbar {
    position: absolute;
    top: 7px;
    right: 7px;
    left: 7px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 2;
    pointer-events: none;
  }

  .code-lang-label {
    margin-right: auto;
    color: #8f887d;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding-left: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .code-tool-btn {
    pointer-events: auto;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.055);
    color: #d8d3c8;
    border-radius: 999px;
    min-width: 46px;
    height: 28px;
    padding: 0 9px;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .code-tool-btn:active {
    background: rgba(255,255,255,0.13);
    transform: scale(0.96);
  }

  .assistant .bubble pre code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.65;
  }
</style>


<style id="code-highlight-contrast-style">
  .assistant .bubble pre {
    background: #0b0f14 !important;
    border: 1px solid rgba(160, 180, 200, 0.22) !important;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.025),
      0 8px 24px rgba(0,0,0,0.22) !important;
  }

  .assistant .bubble pre code,
  .assistant .bubble pre code.hljs {
    background: transparent !important;
    color: #d7e2f0 !important;
  }

  .hljs-keyword,
  .hljs-selector-tag,
  .hljs-built_in,
  .hljs-name,
  .hljs-tag {
    color: #ff8fb3 !important;
  }

  .hljs-string,
  .hljs-title,
  .hljs-section,
  .hljs-attribute,
  .hljs-literal,
  .hljs-template-tag,
  .hljs-template-variable,
  .hljs-type,
  .hljs-addition {
    color: #a5e075 !important;
  }

  .hljs-number,
  .hljs-symbol,
  .hljs-bullet,
  .hljs-variable,
  .hljs-regexp,
  .hljs-link {
    color: #f6c177 !important;
  }

  .hljs-comment,
  .hljs-quote,
  .hljs-deletion,
  .hljs-meta {
    color: #7f8ea3 !important;
    font-style: italic;
  }

  .hljs-function .hljs-title,
  .hljs-title.function_,
  .hljs-title.class_ {
    color: #7dd3fc !important;
  }

  .hljs-params {
    color: #d7e2f0 !important;
  }

  .code-lang-label {
    color: #93a4b8 !important;
  }

  .code-tool-btn {
    background: rgba(125, 145, 170, 0.16) !important;
    border-color: rgba(170, 190, 220, 0.18) !important;
    color: #dbe7f5 !important;
  }
</style>


<style id="agent-button-style">
  .agent-btn {
    background: rgba(255,255,255,0.10) !important;
    color: #e8ddcc !important;
    font-size: 19px !important;
    margin-right: 4px;
  }

  .agent-btn:active {
    transform: scale(0.94);
    background: rgba(255,255,255,0.16) !important;
  }
</style>

<style id="version-toggle-styles">
  .version-section {
    margin-top: 6px;

</style>

</head>

<body>
  <div class="topbar">
    <button id="openDrawer" class="menu-btn">☰</button>
    <div id="topTitle" class="title">Claude Web</div>
    <button id="shareBtn" class="share-btn">Share</button>
  </div>

  <div id="drawerOverlay" class="drawer-overlay"></div>

  <aside id="drawer" class="drawer">
    <div class="drawer-head">
      <div>
        <div class="drawer-title">Claude Web</div>
        <div class="drawer-sub">对话、模型、接入商</div>
      </div>
      <button id="closeDrawer" class="close-btn">×</button>
    </div>

    <div class="section">
      <div class="section-title">对话</div>
      <div class="session-tools">
        <input id="sessionSearch" class="session-search" placeholder="搜索对话" />
        <button id="newConvBtn" class="drawer-btn new-conv-icon" title="新对话">+</button>
      </div>
      <div id="sessionList" class="session-list"></div>
      <div class="session-actions">
        <button id="renameConvBtn" class="drawer-btn">重命名</button>
        <button id="exportConvBtn" class="drawer-btn">导出</button>
        <button id="deleteConvBtn" class="drawer-btn danger">删除</button>
      </div>
    </div>


    <div class="section">
      <div class="section-title">
        <span>模型</span>
        <button id="toggleModelListBtn" class="section-title-btn" type="button">展开</button>
      </div>
      <div class="field">
        <label>线路</label>
        <select id="routeMode">
          <option value="cc">CC 本地代理：可控制 Ubuntu</option>
          <option value="direct">专用直连流式：更快，不控制本地</option>
        </select>
      </div>

      <div id="modelChoices" class="grid2">
        <button class="model-choice active" data-model="claude-opus-4-7">Opus 4.7</button>
        <button class="model-choice" data-model="claude-opus-4-6">Opus 4.6</button>
        <button class="model-choice" data-model="claude-sonnet-4-6">Sonnet 4.6</button>
        <button class="model-choice" data-model="gpt-5.5">GPT-5.5</button>
        <button class="model-choice" data-model="custom">自定义</button>
      </div>

      <div id="customModelBox" class="field" style="display:none;margin-top:10px;">
        <label>模型 ID</label>
        <input id="apiModel" value="claude-opus-4-7" />
      </div>

      <button id="fetchModelsBtn" class="drawer-btn" type="button">拉取当前接入商模型</button>
      <div id="fetchModelsStatus" class="fetch-models-status"></div>
      <div id="fetchedModelsList" class="fetched-models-list"></div>
    </div>

    <div class="section">
      <div class="section-title">接入商</div>

      <div class="field">
        <label>选择接入商</label>
        <select id="profileSelect"></select>
      </div>

      <div class="field">
        <label>名称</label>
        <input id="profileName" placeholder="例如 DeepKey" />
      </div>

      <div class="field">
        <label>API URL</label>
        <input id="apiUrl" placeholder="https://deepkey.top" />
      </div>

      <div class="field">
        <label>API Key</label>
        <input id="apiKey" type="password" />
      </div>

      <button id="newProfileBtn" class="drawer-btn">新增接入商</button>
      <button id="saveProfileBtn" class="drawer-btn">保存接入商</button>
      <button id="defaultProfileBtn" class="drawer-btn">设为默认</button>
      <button id="deleteProfileBtn" class="drawer-btn danger">删除接入商</button>
    </div>
  </aside>

  <main class="wrap">
    <div id="chatList">
      <div class="empty">加载中...</div>
    </div>
  </main>

  <div class="composer">
    <div class="composer-inner">
      <textarea id="prompt" placeholder="Write a message..."></textarea>
      <div id="fileInfo" class="file-info"></div>
      <div id="preview" class="preview"></div>
      <button id="clearFilesBtn" class="clear-files-btn" type="button">取消附件</button>

      <div class="toolbar">
        <button id="plusBtn" class="plus-btn">+</button>
        <input id="fileInput" type="file" multiple accept=".txt,.md,.py,.js,.ts,.json,.log,.yaml,.yml,.toml,.csv,.xml,.html,.css,.c,.cpp,.h,.java,.go,.rs,.php,.sh,.sql,.ini,.conf,.env,.tex,.png,.jpg,.jpeg,.webp,.gif,.bmp,.svg,.pdf" />
        <button id="modelPill" class="model-pill">Opus 4.7⌄</button>
        <button id="agentBtn" class="send-btn agent-btn" title="AI执行本地终端任务">⚙</button>
        <button id="sendBtn" class="send-btn">↑</button>
      </div>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    const chatList = $("chatList");
    const topTitle = $("topTitle");

    const drawer = $("drawer");
    const overlay = $("drawerOverlay");

    const sessionList = $("sessionList");
    const sessionSearch = $("sessionSearch");
    const profileSelect = $("profileSelect");

    const profileName = $("profileName");
    const apiUrl = $("apiUrl");
    const apiKey = $("apiKey");
    const apiModel = $("apiModel");
    const routeMode = $("routeMode");

    const modelChoices = $("modelChoices");
    const toggleModelListBtn = $("toggleModelListBtn");
    const customModelBox = $("customModelBox");
    const modelPill = $("modelPill");
    const fetchModelsBtn = $("fetchModelsBtn");
    const fetchModelsStatus = $("fetchModelsStatus");
    const fetchedModelsList = $("fetchedModelsList");

    const promptEl = $("prompt");
    const sendBtn = $("sendBtn");
    const agentBtn = $("agentBtn");
    const fileInput = $("fileInput");
    const fileInfo = $("fileInfo");
    const preview = $("preview");
    const clearFilesBtn = $("clearFilesBtn");

    let conversations = [];
    let autoScrollEnabled = true;
    const AUTO_SCROLL_THRESHOLD = 140;
    let userScrollActive = false;
    let userScrollTimer = null;
    let activeConversationId = null;
    let messages = [];
    let profiles = [];
    let activeProfileId = "";
    let sending = false;
    let loadSeq = 0;

    function escapeHtml(t) {
      const d = document.createElement("div");
      d.textContent = t || "";
      return d.innerHTML;
    }

    async function api(method, url, body, form = false) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 15000);

      try {
        const opt = { method, signal: controller.signal };
        if (body !== undefined) {
          if (form) opt.body = body;
          else {
            opt.headers = { "Content-Type": "application/json" };
            opt.body = JSON.stringify(body);
          }
        }

        const r = await fetch(url, opt);
        const text = await r.text();
        let data = {};

        if (text) {
          try {
            data = JSON.parse(text);
          } catch (e) {
            throw new Error("服务返回了非 JSON 内容，可能是公网隧道临时离线");
          }
        }

        if (!r.ok) {
          throw new Error(data.detail || data.error || ("请求失败 HTTP " + r.status));
        }

        return data;
      } catch (e) {
        if (e && e.name === "AbortError") {
          throw new Error("请求超时，请检查本地服务或公网隧道是否在线");
        }
        throw e;
      } finally {
        clearTimeout(timer);
      }
    }

    function modelLabel(m) {
      m = (m || "").toLowerCase();
      if (m.includes("opus-4-7")) return "Opus 4.7⌄";
      if (m.includes("opus-4-6")) return "Opus 4.6⌄";
      if (m.includes("sonnet-4-6")) return "Sonnet 4.6⌄";
      if (m.includes("gpt-5.5")) return "GPT-5.5⌄";
      if (m.includes("gpt")) return apiModel.value.trim() + "⌄";
      return (apiModel.value.trim() || "模型") + "⌄";
    }

    function currentModelKey() {
      return "model_for_" + (activeProfileId || apiUrl.value.trim() || "default");
    }

    function setModel(model) {
      apiModel.value = model || "claude-opus-4-7";
      modelPill.textContent = modelLabel(apiModel.value);

      let matched = false;
      modelChoices.querySelectorAll(".model-choice").forEach(b => {
        const active = b.dataset.model !== "custom" && b.dataset.model === apiModel.value;
        if (active) matched = true;
        b.classList.toggle("active", active);
      });

      const custom = modelChoices.querySelector('[data-model="custom"]');
      if (custom) custom.classList.toggle("active", !matched);
      customModelBox.style.display = matched ? "none" : "block";

      localStorage.setItem("last_model_global", apiModel.value);
      localStorage.setItem(currentModelKey(), apiModel.value);
    }

    function setModelChoicesCollapsed(collapsed) {
      modelChoices.classList.toggle("model-choices-collapsed", collapsed);
      toggleModelListBtn.textContent = collapsed ? "展开" : "折叠";
      toggleModelListBtn.title = collapsed ? "展开完整模型列表" : "折叠模型列表";
      localStorage.setItem("model_choices_collapsed", collapsed ? "1" : "0");
    }

    function restoreModel() {
      const m = localStorage.getItem(currentModelKey()) || localStorage.getItem("last_model_global") || apiModel.value || "claude-opus-4-7";
      setModel(m);
    }

    function addModelChoiceButton(model) {
      if (!model) return;

      const exists = Array.from(modelChoices.querySelectorAll(".model-choice"))
        .some(btn => btn.dataset.model === model);

      if (exists) return;

      const customBtn = modelChoices.querySelector('[data-model="custom"]');

      const btn = document.createElement("button");
      btn.className = "model-choice";
      btn.dataset.model = model;
      btn.textContent = model;

      if (customBtn) {
        modelChoices.insertBefore(btn, customBtn);
      } else {
        modelChoices.appendChild(btn);
      }
    }

    function providerModelsKey() {
      return "models_for_" + (activeProfileId || apiUrl.value.trim() || "default");
    }

    function saveProviderModels(models) {
      try {
        localStorage.setItem(providerModelsKey(), JSON.stringify(models || []));
      } catch (e) {}
    }

    function loadProviderModels() {
      try {
        const raw = localStorage.getItem(providerModelsKey());
        const arr = raw ? JSON.parse(raw) : [];
        if (Array.isArray(arr)) {
          arr.forEach(addModelChoiceButton);
        }
      } catch (e) {}
    }

    async function fetchModelsFromProvider() {
      const base = apiUrl.value.trim();
      const token = apiKey.value.trim();

      if (!base || !token) {
        fetchModelsStatus.textContent = "请先填写 API URL 和 API Key";
        fetchModelsStatus.className = "fetch-models-status bad";
        return;
      }

      fetchModelsStatus.textContent = "正在拉取模型...";
      fetchModelsStatus.className = "fetch-models-status";
      fetchedModelsList.innerHTML = "";

      try {
        const data = await api("POST", "/api/profiles/models", {
          name: profileName.value.trim() || "未命名",
          base_url: base,
          auth_token: token,
          model: apiModel.value.trim() || "claude-opus-4-7",
          is_default: false
        });

        if (!data.ok) {
          fetchModelsStatus.textContent = "拉取失败：" + (data.error || "未知错误");
          fetchModelsStatus.className = "fetch-models-status bad";
          return;
        }

        const models = data.models || [];

        if (!models.length) {
          fetchModelsStatus.textContent = "没有返回模型列表";
          fetchModelsStatus.className = "fetch-models-status bad";
          return;
        }

        saveProviderModels(models);
        models.forEach(addModelChoiceButton);

        fetchedModelsList.innerHTML = models.map(m =>
          `<button type="button" class="fetched-model-btn" data-model="${escapeHtml(m)}">${escapeHtml(m)}</button>`
        ).join("");

        fetchModelsStatus.textContent = "已拉取 " + models.length + " 个模型";
        fetchModelsStatus.className = "fetch-models-status good";
      } catch (e) {
        fetchModelsStatus.textContent = "拉取失败：" + e;
        fetchModelsStatus.className = "fetch-models-status bad";
      }
    }

    function providerName() {
      return profileName.value.trim() || apiUrl.value.trim() || "当前接入商";
    }

    function repairFractions(latex) {
      if (!latex) return latex;
      let x = latex;

      x = x.replace(/\(([^()]+)\)\s*\/\s*\(([^()]+)\)/g, (_, a, b) => `\\frac{${a.trim()}}{${b.trim()}}`);

      x = x.replace(/(^|[\s=+\-*/(])([\-]?(?:\\?[a-zA-Z]+|\d+)(?:\^\{?[\w+\-]+\}?)*(?:[a-zA-Z0-9^{}]*)?)\s*\/\s*([\-]?(?:\\?[a-zA-Z]+|\d+)(?:\^\{?[\w+\-]+\}?)*(?:[a-zA-Z0-9^{}]*)?)/g,
        (_, prefix, a, b) => prefix + `\\frac{${a.trim()}}{${b.trim()}}`
      );

      return x;
    }

    function repairMath(root) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);

      nodes.forEach(n => {
        let t = n.nodeValue || "";

        t = t.replace(/\$\$([\s\S]*?)\$\$/g, (_, inner) => "$$" + repairFractions(inner) + "$$");
        t = t.replace(/\$([^$\n]+?)\$/g, (_, inner) => "$" + repairFractions(inner) + "$");
        t = t.replace(/\\\[([\s\S]*?)\\\]/g, (_, inner) => "\\[" + repairFractions(inner) + "\\]");
        t = t.replace(/\\\(([\s\S]*?)\\\)/g, (_, inner) => "\\(" + repairFractions(inner) + "\\)");

        n.nodeValue = t;
      });
    }

    function enhanceCodeBlocks(root) {
      const pres = root.querySelectorAll("pre");

      pres.forEach((pre) => {
        if (pre.dataset.enhanced === "1") return;
        pre.dataset.enhanced = "1";

        const code = pre.querySelector("code");
        if (!code) return;

        // 高亮
        if (window.hljs) {
          try {
            hljs.highlightElement(code);
          } catch (e) {}
        }

        // 语言标签
        let lang = "code";
        const cls = code.className || "";
        const m = cls.match(/language-([a-zA-Z0-9_+\-#]+)/);
        if (m) lang = m[1];

        const toolbar = document.createElement("div");
        toolbar.className = "code-toolbar";

        const label = document.createElement("div");
        label.className = "code-lang-label";
        label.textContent = lang;

        const foldBtn = document.createElement("button");
        foldBtn.className = "code-tool-btn";
        foldBtn.type = "button";
        foldBtn.textContent = "折叠";

        const copyBtn = document.createElement("button");
        copyBtn.className = "code-tool-btn";
        copyBtn.type = "button";
        copyBtn.textContent = "复制";

        toolbar.appendChild(label);
        toolbar.appendChild(foldBtn);
        toolbar.appendChild(copyBtn);
        pre.appendChild(toolbar);

        foldBtn.addEventListener("click", () => {
          pre.classList.toggle("code-collapsed");
          foldBtn.textContent = pre.classList.contains("code-collapsed") ? "展开" : "折叠";
        });

        copyBtn.addEventListener("click", async () => {
          const text = code.innerText || code.textContent || "";

          try {
            await navigator.clipboard.writeText(text);
            copyBtn.textContent = "已复制";
            setTimeout(() => copyBtn.textContent = "复制", 1200);
          } catch (e) {
            // 安卓某些浏览器不允许 clipboard API，使用兜底方案
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();

            try {
              document.execCommand("copy");
              copyBtn.textContent = "已复制";
            } catch (_) {
              copyBtn.textContent = "失败";
            }

            document.body.removeChild(ta);
            setTimeout(() => copyBtn.textContent = "复制", 1200);
          }
        });
      });
    }

    function renderMath(root) {
      repairMath(root);
      if (window.MathJax && MathJax.typesetPromise) {
        const run = () => MathJax.typesetPromise([root]).catch(() => {});
        if (window.requestIdleCallback) {
          requestIdleCallback(run, { timeout: 1200 });
        } else {
          setTimeout(run, 0);
        }
      }
    }

    function renderMarkdown(text) {
      if (window.marked && marked.parse) {
        return marked.parse(text || "");
      }
      return escapeHtml(text || "").replace(/\n/g, "<br>");
    }

    function parseImagePreviewList(value) {
      if (!value) return [];

      if (Array.isArray(value)) return value;

      if (typeof value === "string") {
        const v = value.trim();

        if (!v) return [];

        try {
          const parsed = JSON.parse(v);
          if (Array.isArray(parsed)) return parsed;
        } catch (e) {}

        return [v];
      }

      return [];
    }

    let renderMessagesJob = 0;

    function getMessageId(msg) {
      return msg && msg.id !== undefined && msg.id !== null ? String(msg.id) : "";
    }

    function isThinkingMessage(msg) {
      return (msg && (msg.content || "").trim()) === "思考中...";
    }

    function messageHasCopyableText(msg) {
      return !!((msg && msg.content) || "").trim() && !isThinkingMessage(msg);
    }

    function makeMessageButton(className, title, text, msg, idx) {
      const btn = document.createElement("button");
      btn.className = "small-btn " + className;
      btn.type = "button";
      btn.title = title;
      btn.textContent = text;
      btn.dataset.msgId = getMessageId(msg);
      btn.dataset.idx = String(idx);
      return btn;
    }

    function createMessageElement(msg, idx, lightweight = false) {
      const wrap = document.createElement("div");
      wrap.className = "msg-wrap " + msg.role;
      if (msg.supersededBy) {
        wrap.classList.add("superseded-msg");
        wrap.dataset.supersededBy = msg.supersededBy;
      }
      wrap.dataset.msgId = getMessageId(msg);

      const row = document.createElement("div");
      row.className = "msg " + msg.role;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (msg.role === "assistant") {
        if ((msg.content || "").trim() === "思考中...") {
          bubble.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
        } else {
          bubble.innerHTML = renderMarkdown(msg.content || "");

          if (!lightweight) {
            enhanceCodeBlocks(bubble);
            renderMath(bubble);
          }

          if (msg.model || msg.providerName) {
            const meta = document.createElement("div");
            meta.className = "answer-meta";
            let metaText = (msg.providerName || "未知接入商") + " · " + (msg.model || "未知模型");
            if (msg.tokenCount) {
              metaText += " · 约 " + msg.tokenCount + " tokens";
            }
            meta.textContent = metaText;
            bubble.appendChild(meta);
          }
        }
      } else {
        let html = escapeHtml(msg.content || "").replace(/\n/g, "<br>");
        if (msg.fileName && !msg.imagePreview) {
          html += `<div class="file-chip">${escapeHtml(msg.fileName)}</div>`;
        }

        const imgs = parseImagePreviewList(msg.imagePreview);
        if (imgs.length) {
          html += '<div class="user-upload">';
          imgs.forEach(src => {
            html += `<img src="${escapeHtml(src)}" />`;
          });
          html += '</div>';
        }

        bubble.innerHTML = html || " ";
      }

      row.appendChild(bubble);
      wrap.appendChild(row);

      const actions = document.createElement("div");
      actions.className = "msg-actions";

      actions.appendChild(makeMessageButton("delete-msg", "删除这条及之后消息", "⌫", msg, idx));
      if (messageHasCopyableText(msg)) {
        actions.appendChild(makeMessageButton("copy-msg", "复制消息", "📋", msg, idx));
      }
      if (msg.role === "assistant" && getMessageId(msg) && !isThinkingMessage(msg)) {
        actions.appendChild(makeMessageButton("regen-msg", "重新回答", "↻", msg, idx));
      }

      if (msg._versions && msg._versions.length > 0) {
        const versionSection = document.createElement("div");
        versionSection.className = "version-section";

        const toggleBtn = document.createElement("button");
        toggleBtn.className = "version-toggle-btn";
        toggleBtn.type = "button";
        const totalVersions = msg._versions.length + 1;
        toggleBtn.textContent = `历史版本 (${msg._versions.length}) / 共 ${totalVersions} 个`;
        toggleBtn.dataset.openText = `收起版本 (${msg._versions.length}) / 共 ${totalVersions} 个`;
        toggleBtn.dataset.closedText = toggleBtn.textContent;
        toggleBtn.dataset.msgId = getMessageId(msg);
        versionSection.appendChild(toggleBtn);

        const altContainer = document.createElement("div");
        altContainer.className = "alt-versions-container";
        altContainer.hidden = true;

        msg._versions.forEach((alt, altIdx) => {
          const altWrap = document.createElement("div");
          altWrap.className = "alt-version";
          altWrap.dataset.altMsgId = alt.id || "";

          const altHeader = document.createElement("div");
          altHeader.className = "alt-version-header";
          const badge = document.createElement("span");
          badge.className = "alt-version-badge";
          badge.textContent = "v" + (altIdx + 2);
          altHeader.appendChild(badge);

          if (alt.model || alt.providerName) {
            const altMeta = document.createElement("span");
            altMeta.style.cssText = "font-size:11px;color:#8f887d;";
            altMeta.textContent = (alt.providerName || "") + " · " + (alt.model || "");
            altHeader.appendChild(altMeta);
          }

          if (messageHasCopyableText(alt)) {
            altHeader.appendChild(makeMessageButton("copy-msg", "复制历史版本", "📋", alt, -1));
          }

          altWrap.appendChild(altHeader);

          const altBubble = document.createElement("div");
          altBubble.className = "bubble";
          altBubble.innerHTML = renderMarkdown(alt.content || "");
          altWrap.appendChild(altBubble);

          altContainer.appendChild(altWrap);
        });

        versionSection.appendChild(altContainer);
        wrap.appendChild(versionSection);
      }

      wrap.appendChild(actions);
      return wrap;
    }

    function scheduleMessageEnhancements(jobId) {
      if (!window.requestIdleCallback && !window.requestAnimationFrame) return;

      const run = deadline => {
        if (jobId !== renderMessagesJob) return;

        const bubbles = Array.from(chatList.querySelectorAll(".msg-wrap.assistant .bubble:not([data-enhanced])"));
        const end = deadline && typeof deadline.timeRemaining === "function"
          ? () => deadline.timeRemaining() > 4
          : () => false;

        let processed = 0;
        while (bubbles.length && (processed < 2 || end())) {
          const bubble = bubbles.shift();
          bubble.dataset.enhanced = "1";
          enhanceCodeBlocks(bubble);
          renderMath(bubble);
          processed += 1;
        }

        if (bubbles.length && jobId === renderMessagesJob) {
          if (window.requestIdleCallback) requestIdleCallback(run, { timeout: 800 });
          else requestAnimationFrame(() => run(null));
        }
      };

      if (window.requestIdleCallback) requestIdleCallback(run, { timeout: 800 });
      else requestAnimationFrame(() => run(null));
    }

    function buildVersionChains(msgs) {
      const byId = {};
      msgs.forEach(m => {
        const id = getMessageId(m);
        if (id) byId[id] = m;
        m._versions = [];
      });

      const supersededIds = new Set();
      msgs.forEach(m => {
        const id = getMessageId(m);
        if (id && m.supersededBy) supersededIds.add(id);
      });

      function findLatest(msgId) {
        let current = String(msgId);
        while (byId[current] && byId[current].supersededBy && byId[String(byId[current].supersededBy)]) {
          current = String(byId[current].supersededBy);
        }
        return current;
      }

      const versionGroups = {};
      msgs.forEach(m => {
        const id = getMessageId(m);
        if (id && m.supersededBy) {
          const latestId = findLatest(id);
          if (!versionGroups[latestId]) versionGroups[latestId] = [];
          if (!versionGroups[latestId].some(v => getMessageId(v) === id)) {
            versionGroups[latestId].push(m);
          }
        }
      });

      Object.values(versionGroups).forEach(group => {
        group.sort((a, b) => (a.id || 0) - (b.id || 0));
      });

      msgs.forEach(m => {
        m._versions = versionGroups[getMessageId(m)] || [];
      });

      return msgs.filter(m => !supersededIds.has(getMessageId(m)));
    }

    function renderMessages(forceScroll = false) {
      const jobId = ++renderMessagesJob;

      if (!messages.length) {
        chatList.innerHTML = '<div class="empty">当前对话还没有消息</div>';
        return;
      }

      const shouldAutoScroll = forceScroll || autoScrollEnabled;
      const oldScrollY = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;

      chatList.innerHTML = "";

      const displayMessages = buildVersionChains(messages);

      const fragment = document.createDocumentFragment();
      displayMessages.forEach((msg, idx) => {
        fragment.appendChild(createMessageElement(msg, idx, true));
      });
      chatList.appendChild(fragment);
      scheduleMessageEnhancements(jobId);

      if (shouldAutoScroll) {
        scrollToBottomIfNeeded(forceScroll);
      } else {
        restoreScrollPosition(oldScrollY);
      }
    }



    // ============================================================
    // 流式输出性能优化：
    // 不再每个 chunk 重绘整个聊天列表，只更新最后一个 assistant bubble。
    // 这样可以显著降低手机端 DOM 重建、Markdown 渲染和滚动抖动。
    // ============================================================
    let streamingRenderQueued = false;
    let pendingStreamingContent = "";

    function getLastAssistantBubble() {
      const assistantWraps = chatList.querySelectorAll(".msg-wrap.assistant");
      if (!assistantWraps.length) return null;

      const lastWrap = assistantWraps[assistantWraps.length - 1];
      return lastWrap.querySelector(".bubble");
    }

    function renderAssistantContentIntoBubble(bubble, content, finalRender = false) {
      if (!bubble) return false;

      const text = content || "";

      if (text.trim() === "思考中...") {
        bubble.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
        return true;
      }

      // 流式过程中只做 Markdown 渲染，不做每帧代码高亮和 MathJax，避免手机卡顿。
      // 最后一帧 finalRender=true 时再补做增强。
      bubble.innerHTML = renderMarkdown(text);

      if (finalRender) {
        enhanceCodeBlocks(bubble);
        renderMath(bubble);
      }

      return true;
    }

    function followBottomDuringStreaming() {
      // 兼容前面补过的智能滚动函数
      if (typeof scrollToBottomIfNeeded === "function") {
        scrollToBottomIfNeeded(false);
        return;
      }

      // 兼容原始版本
      if (typeof autoScrollEnabled !== "undefined" && autoScrollEnabled) {
        requestAnimationFrame(() => {
          window.scrollTo({
            top: document.documentElement.scrollHeight || document.body.scrollHeight || 0,
            behavior: "auto"
          });
        });
      }
    }

    function updateLastAssistantBubble(content, finalRender = false) {
      const bubble = getLastAssistantBubble();

      // 如果找不到最后一个 assistant bubble，说明 DOM 状态不完整，退回全量渲染。
      if (!bubble) {
        renderMessages();
        return false;
      }

      renderAssistantContentIntoBubble(bubble, content, finalRender);
      followBottomDuringStreaming();
      return true;
    }

    function scheduleStreamingAssistantUpdate(content) {
      pendingStreamingContent = content || "";

      if (streamingRenderQueued) return;

      streamingRenderQueued = true;

      requestAnimationFrame(() => {
        streamingRenderQueued = false;
        const text = pendingStreamingContent;
        pendingStreamingContent = "";
        updateLastAssistantBubble(text, false);
      });
    }

    function flushStreamingAssistantUpdate(finalRender = true) {
      streamingRenderQueued = false;
      const text = pendingStreamingContent || (messages.length ? (messages[messages.length - 1].content || "") : "");
      pendingStreamingContent = "";
      updateLastAssistantBubble(text, finalRender);
    }

    function getPageHeight() {
      return Math.max(
        document.documentElement.scrollHeight || 0,
        document.body.scrollHeight || 0
      );
    }

    function getScrollTop() {
      return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
    }

    function isNearBottom(threshold = AUTO_SCROLL_THRESHOLD) {
      const scrollTop = getScrollTop();
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
      const pageHeight = getPageHeight();
      return pageHeight - (scrollTop + viewportHeight) <= threshold;
    }

    function scrollToBottomIfNeeded(force = false) {
      if (!force && !autoScrollEnabled) return;

      requestAnimationFrame(() => {
        window.scrollTo({
          top: getPageHeight(),
          behavior: "auto"
        });
      });
    }

    function restoreScrollPosition(y) {
      requestAnimationFrame(() => {
        window.scrollTo({
          top: y,
          behavior: "auto"

      });
    }

    function pauseAutoScrollByUser() {
      // 用户一旦触摸/滚轮/按键，就立刻暂停自动跟随
      autoScrollEnabled = false;
      userScrollActive = true;

      if (userScrollTimer) {
        clearTimeout(userScrollTimer);
      }

      // 用户停止操作一小段时间后，如果此时已经在底部附近，才恢复自动跟随
      userScrollTimer = setTimeout(() => {
        userScrollActive = false;
        if (isNearBottom()) {
          autoScrollEnabled = true;
        }
      }, 700);
    }

    function maybeResumeAutoScroll() {
      // 正在触摸/滑动时，不要恢复，否则会继续把用户拖到底部
      if (userScrollActive) return;

      if (isNearBottom()) {
        autoScrollEnabled = true;
      }
    }

    // 移动端主要靠 touchmove；PC/外接键盘靠 wheel/keydown
    window.addEventListener("wheel", pauseAutoScrollByUser, { passive: true });
    window.addEventListener("touchmove", pauseAutoScrollByUser, { passive: true });
    window.addEventListener("pointermove", pauseAutoScrollByUser, { passive: true });

    window.addEventListener("keydown", (e) => {
      const keys = [
        "ArrowUp",
        "ArrowDown",
        "PageUp",
        "PageDown",
        "Home",
        "End",
        " "
      ];

      if (keys.includes(e.key)) {
        pauseAutoScrollByUser();
      }
    }, { passive: true });

    // 只有用户停止交互后，并且重新回到底部附近，才恢复自动跟随
    window.addEventListener("scroll", () => {
      maybeResumeAutoScroll();
    }, { passive: true });

    async function runAgentTask() {
      if (sending) return;

      const task = promptEl.value.trim();

      if (!task) return;

      const ok = confirm(
        "你即将让 AI 自动执行本地 Linux 终端命令。\n\n" +
        "它拥有当前 Ubuntu 容器内的完整 shell 权限。\n\n" +
        "是否继续？"
      );

      if (!ok) return;

      sending = true;
      sendBtn.disabled = true;
      agentBtn.disabled = true;

      messages.push({
        role: "user",
        content: "本地终端 Agent 任务：\n" + task
      });

      messages.push({
        role: "assistant",
        content: "思考中..."
      });

      // 用户主动启动 Agent 时，强制回到底部，并开启本轮自动跟随
      autoScrollEnabled = true;
      userScrollActive = false;
      renderMessages(true);
      promptEl.value = "";

      try {
        const data = await api("POST", "/api/agent/run", {
          conversation_id: activeConversationId,
          task,
          cwd: "/root",
          max_steps: 8,
          timeout: 120,
          api_base_url: apiUrl.value.trim(),
          api_auth_token: apiKey.value.trim(),
          api_model: apiModel.value.trim() || "claude-opus-4-7",
          api_profile_name: providerName()
        });

        if (!data.ok) {
          messages[messages.length - 1].content = "Agent 执行失败：" + (data.answer || "未知错误");
          renderMessages();
          return;
        }

        let text = "本地终端 Agent 执行完成。\n\n";

        for (const step of data.steps || []) {
          text += "### 步骤 " + step.step + "\n";
          if (step.reason) text += "原因: " + step.reason + "\n";
          text += "cwd: " + step.cwd + "\n";
          text += "命令:\n```bash\n" + step.command + "\n```\n";
          text += "退出码: " + step.code + "\n";
          text += "输出:\n```text\n" + step.output + "\n```\n\n";
        }

        text += "### 最终结果\n";
        text += data.answer || "";

        messages[messages.length - 1].content = text;
        renderMessages();

        await loadConversations();
        await loadMessages();
        renderAll();
      } catch (e) {
        messages[messages.length - 1].content = "Agent 请求失败：" + e;
        renderMessages();
      } finally {
        sending = false;
        sendBtn.disabled = false;
        agentBtn.disabled = false;
      }
    }

    async function sendPrompt() {
      if (sending) return;

      const text = promptEl.value.trim();
      const files = fileInput.files;

      if (!text && (!files || !files.length)) return;

      sending = true;
      sendBtn.disabled = true;

      let fileName = null;
      let imagePreview = null;

      if (files && files.length) {
        fileName = Array.from(files).map(f => f.name).join(", ");

        const localImgs = [];
        for (const f of files) {
          if (f.type && f.type.startsWith("image/")) {
            localImgs.push(URL.createObjectURL(f));
          }
        }

        imagePreview = localImgs.length ? localImgs : null;
      }

      messages.push({ role: "user", content: text, fileName, imagePreview });
      messages.push({ role: "assistant", content: "思考中..." });

      // 用户主动发送新消息时，强制回到底部，并开启本轮自动跟随
      autoScrollEnabled = true;
      userScrollActive = false;
      renderMessages(true);

      promptEl.value = "";

      const model = apiModel.value.trim() || "claude-opus-4-7";
      setModel(model);

      try {
        let resp;

        if (files && files.length) {
          const form = new FormData();
          form.append("conversation_id", activeConversationId);
          form.append("prompt", text);
          form.append("api_base_url", apiUrl.value.trim());
          form.append("api_auth_token", apiKey.value.trim());
          form.append("api_model", model);
          form.append("api_profile_name", providerName());
          form.append("route_mode", routeMode.value);

          for (const f of files) form.append("files", f);

          resp = await fetch("/api/chat/upload_stream", { method: "POST", body: form });
        } else {
          resp = await fetch("/api/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              conversation_id: activeConversationId,
              prompt: text,
              api_base_url: apiUrl.value.trim(),
              api_auth_token: apiKey.value.trim(),
              api_model: model,
              api_profile_name: providerName(),
              route_mode: routeMode.value
            })
          });
        }

        if (!resp.ok) {
          const errorText = await resp.text().catch(() => "");
          throw new Error(`HTTP ${resp.status}: ${errorText || resp.statusText}`);
        }

        if (!resp.body || !resp.body.getReader) {
          const textBody = await resp.text();
          messages[messages.length - 1].content = textBody || "响应为空";
          flushStreamingAssistantUpdate(true);
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let full = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          messages[messages.length - 1].content = full;
          scheduleStreamingAssistantUpdate(full);
        }

        flushStreamingAssistantUpdate(true);

        clearSelectedFiles();

        await loadConversations();
        await loadMessages();
        renderAll();
      } catch (e) {
        messages[messages.length - 1].content = "请求失败: " + e;
        renderMessages();
      } finally {
        sending = false;
        sendBtn.disabled = false;
      }
    }

      apiUrl.value = "";
      apiKey.value = "";
    };

    $("saveProfileBtn").onclick = async () => {
      const body = {
        name: profileName.value.trim() || "未命名",
        base_url: apiUrl.value.trim(),
        auth_token: apiKey.value.trim(),
        model: apiModel.value.trim() || "claude-opus-4-7",
        is_default: false
      };

      let d;
      if (activeProfileId) d = await api("PUT", `/api/profiles/${activeProfileId}`, body);
      else d = await api("POST", "/api/profiles", body);

      activeProfileId = d.id || activeProfileId;
      await loadProfiles();
    };

    $("defaultProfileBtn").onclick = async () => {
      if (!activeProfileId) return;
      await api("POST", `/api/profiles/${activeProfileId}/default`);
      await loadProfiles();
    };

    $("deleteProfileBtn").onclick = async () => {
      if (!activeProfileId) return;
      if (!confirm("确定删除当前接入商吗？")) return;
      await api("DELETE", `/api/profiles/${activeProfileId}`);
      activeProfileId = "";
      await loadProfiles();
    };

    function clearSelectedFiles() {
      fileInput.value = "";
      fileInfo.textContent = "";
      preview.innerHTML = "";
      clearFilesBtn.style.display = "none";
    }

    $("plusBtn").onclick = () => fileInput.click();
    clearFilesBtn.onclick = clearSelectedFiles;

    fileInput.onchange = () => {
      const files = fileInput.files;
      if (!files || !files.length) {
        clearSelectedFiles();
        return;
      }

      clearFilesBtn.style.display = "inline-block";

      fileInfo.textContent = "已选择 " + files.length + " 个文件：" + Array.from(files).map(f => f.name).join(", ");
      preview.innerHTML = "";

      Array.from(files).forEach(f => {
        if (f.type && f.type.startsWith("image/")) {
          const img = document.createElement("img");
          img.src = URL.createObjectURL(f);
          preview.appendChild(img);
        }
      });
    };

    agentBtn.onclick = runAgentTask;
    sendBtn.onclick = sendPrompt;

    // 输入框回车只换行，不发送消息。
    // 发送消息只通过右侧发送按钮触发。
    promptEl.onkeydown = e => {
      if (e.key === "Enter") {
        return;
      }
    };

    function findMsgIdxById(msgId) {
      for (let i = 0; i < messages.length; i++) {
        if (getMessageId(messages[i]) === String(msgId)) return i;
      }
      return -1;
    }

    function findMessageByButton(btn) {
      const msgId = btn.dataset.msgId || "";
      if (msgId) {
        const idx = findMsgIdxById(msgId);
        if (idx >= 0) return { msg: messages[idx], idx };
      }

      const idx = Number(btn.dataset.idx);
      if (Number.isInteger(idx) && idx >= 0 && idx < messages.length) {
        return { msg: messages[idx], idx };
      }

      return { msg: null, idx: -1 };
    }

    function markCopied(btn) {
      btn.classList.add("copied");
      btn.textContent = "✓";
      setTimeout(() => {
        btn.classList.remove("copied");
        btn.textContent = "📋";
      }, 1500);
    }

    async function copyTextFromButton(copyBtn, text) {
      if (!text) return;

      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
        markCopied(copyBtn);
      } catch (_) {}
    }

    chatList.onclick = e => {
      const del = e.target.closest(".delete-msg");
      if (del) {
        const found = findMessageByButton(del);
        if (found.idx >= 0) return deleteMessageAfter(found.idx);
        return;
      }

      const regen = e.target.closest(".regen-msg");
      if (regen) {
        const found = findMessageByButton(regen);
        if (found.idx >= 0) return regenerateFrom(found.idx);
        return;
      }

      const copyBtn = e.target.closest(".copy-msg");
      if (copyBtn) {
        const found = findMessageByButton(copyBtn);
        const text = found.msg ? (found.msg.content || "").trim() : "";
        copyTextFromButton(copyBtn, text);
        return;
      }

      const versionToggle = e.target.closest(".version-toggle-btn");
      if (versionToggle) {
        const versionSection = versionToggle.closest(".version-section");
        if (versionSection) {
          const container = versionSection.querySelector(".alt-versions-container");
          if (container) {
            const willOpen = container.hidden;
            container.hidden = !willOpen;
            versionToggle.textContent = willOpen
              ? versionToggle.dataset.openText
              : versionToggle.dataset.closedText;
          }
        }
        return;
      }
    };

    async function initPage() {
      const seq = ++loadSeq;
      chatList.innerHTML = '<div class="empty">加载中...</div>';
      const fallbackTimer = setTimeout(() => {
        if (seq === loadSeq && chatList.textContent.includes("加载中")) {
          showLoadError("页面初始化超时，请点击重试");
        }
      }, 8000);

      try {
        await loadProfiles();
        if (seq !== loadSeq) return;
        restoreModel();
        loadProviderModels();
        setModelChoicesCollapsed(localStorage.getItem("model_choices_collapsed") !== "0");
        await loadConversations();
      } catch (e) {
        if (seq === loadSeq) showLoadError(e.message || String(e));
      } finally {
        clearTimeout(fallbackTimer);
      }
    }

    initPage();
  </script>
</body>
</html>
