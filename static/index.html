    function renderSearchResults(container, results, keyword, mode) {
      if (!container) return;
      const query = (keyword || "").trim();
      if (!query) {
        container.innerHTML = "";
        return;
      }
      if (!results || !results.length) {
        container.innerHTML = '<div class="session-empty">没有匹配内容</div>';
        return;
      }
      container.innerHTML = "";
      results.forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "search-result-item";
        btn.dataset.conversationId = item.conversation_id || "";
        btn.dataset.messageId = item.message_id || "";
        btn.dataset.keyword = query;
        const title = item.conversation_title || "新对话";
        const meta = roleLabel(item.role) + " · " + fieldLabel(item.matched_field);
        btn.innerHTML =
          '<div class="search-result-title">' +
            '<span>' + escapeHtml(mode === "global" ? title : meta) + '</span>' +
            '<span class="search-result-meta">' + escapeHtml(mode === "global" ? meta : ("#" + (item.message_id || ""))) + '</span>' +
          '</div>' +
          '<div class="search-result-snippet">' + highlightKeywordHtml(item.snippet || "", query) + '</div>';
        btn.onclick = () => jumpToSearchResult(item, query, mode);
        container.appendChild(btn);
      });
    }

    async function runSearch(mode) {
      const isGlobal = mode === "global";
      const input = isGlobal ? globalContentSearch : conversationSearchInput;
      const container = isGlobal ? globalContentSearchResults : conversationSearchResults;
      const keyword = (input && input.value || "").trim();
      if (!keyword) {
        renderSearchResults(container, [], "", mode);
        return;
      }
      if (container) container.innerHTML = '<div class="session-empty">搜索中...</div>';
      try {
        const params = new URLSearchParams({ q: keyword, limit: "80" });
        if (!isGlobal && activeConversationId) {
          params.set("scope", "conversation");
          params.set("conversation_id", activeConversationId);
        }
        const data = await api("GET", "/api/search?" + params.toString());
        renderSearchResults(container, data.results || [], keyword, mode);
      } catch (e) {
        if (container) container.innerHTML = '<div class="session-empty">搜索失败：' + escapeHtml(e.message || String(e)) + '</div>';
      }
    }

    const runGlobalSearchDebounced = debounceSearch(() => runSearch("global"));
    const runConversationSearchDebounced = debounceSearch(() => runSearch("conversation"));

    function openConversationSearch() {
      if (!conversationSearchPanel) return;
      conversationSearchPanel.hidden = false;
      if (conversationSearchToggle) conversationSearchToggle.classList.add("active");
      setTimeout(() => {
        if (conversationSearchInput) conversationSearchInput.focus();
      }, 0);

    function closeConversationSearch() {
      if (!conversationSearchPanel) return;
      conversationSearchPanel.hidden = true;
      if (conversationSearchToggle) conversationSearchToggle.classList.remove("active");

    function focusMessageElement(messageId, keyword = "") {
      pendingJumpMessageId = String(messageId || "");
      pendingSearchKeyword = keyword || "";
      lastRenderedMsgKey = "";
      renderMessages(false);
      requestAnimationFrame(() => {
        const safeId = window.CSS && CSS.escape
          ? CSS.escape(String(messageId || ""))
          : String(messageId || "").replace(/"/g, '\\"');
        const selector = `.msg-wrap[data-msg-id="${safeId}"]`;
        const target = chatList.querySelector(selector);
        if (!target) return;
        target.classList.add("search-jump-highlight");
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        setTimeout(() => target.classList.remove("search-jump-highlight"), 2200);
      });

    async function jumpToSearchResult(item, keyword, mode) {
      if (!item || !item.conversation_id || !item.message_id) return;
      const targetConversation = conversations.find(c => c.id === item.conversation_id) || {
        id: item.conversation_id,
        title: item.conversation_title || "搜索结果"
      };
      if (targetConversation.id !== activeConversationId) {
        activeConversationId = targetConversation.id;
        localStorage.setItem("active_conversation", activeConversationId);
        topTitle.textContent = targetConversation.title || "Claude Web";
        await loadMessages();
        renderAll();
      }
      closeDrawer();
      if (mode === "global") closeConversationSearch();
      focusMessageElement(item.message_id, keyword);
    }

    function renderSessions() {
      sessionList.innerHTML = "";
      const keyword = (sessionSearch.value || "").trim().toLowerCase();
      const visibleConversations = conversations.filter(c => {
        if (!keyword) return true;
        return (c.title || "新对话").toLowerCase().includes(keyword);
      });

      if (!visibleConversations.length) {
        sessionList.innerHTML = '<div class="session-empty">没有匹配的对话</div>';
        return;
      }

      visibleConversations.forEach(c => {
        const row = document.createElement("div");
        row.className = "session-row";

        const b = document.createElement("button");
        b.className = "session-item" + (c.id === activeConversationId ? " active" : "");
        b.textContent = (c.is_pinned ? "● " : "") + (c.title || "新对话");
        b.title = c.title || "新对话";
        b.onclick = () => {
          if (c.id === activeConversationId) {
            closeDrawer();
            return;
          }

          switchConversation(c);
        };

        const pin = document.createElement("button");
        pin.className = "pin-btn" + (c.is_pinned ? " active" : "");
        pin.textContent = c.is_pinned ? "★" : "☆";
        pin.title = c.is_pinned ? "取消固定" : "固定对话";
        pin.onclick = async e => {
          e.stopPropagation();
          await api("POST", `/api/conversations/${c.id}/pin`, { pinned: !c.is_pinned });
          const d = await api("GET", "/api/conversations");
          conversations = d.conversations || [];
          renderSessions();
        };

        const more = document.createElement("button");
        more.className = "session-more-btn";
        more.textContent = "⋯";
        more.title = "对话操作";
        more.setAttribute("aria-expanded", "false");
        more.onclick = e => {
          e.stopPropagation();
          const isOpen = !menu.hidden;
          sessionList.querySelectorAll(".session-menu").forEach(m => {
            m.hidden = true;
            const btn = m.parentElement && m.parentElement.querySelector(".session-more-btn");
            if (btn) btn.setAttribute("aria-expanded", "false");
          });
          menu.hidden = isOpen;
          more.setAttribute("aria-expanded", String(!isOpen));
        };

        const menu = document.createElement("div");
        menu.className = "session-menu";
        menu.hidden = true;

        const rename = document.createElement("button");
        rename.type = "button";
        rename.textContent = "重命名";
        rename.onclick = async e => {
          e.stopPropagation();
          menu.hidden = true;
          more.setAttribute("aria-expanded", "false");
          await renameConversation(c);
        };

        const exportBtn = document.createElement("button");
        exportBtn.type = "button";
        exportBtn.textContent = "导出";
        exportBtn.onclick = e => {
          e.stopPropagation();
          menu.hidden = true;
          more.setAttribute("aria-expanded", "false");
          exportConversation(c.id);
        };

        const del = document.createElement("button");
        del.type = "button";
        del.className = "danger";
        del.textContent = "删除";
        del.onclick = async e => {
          e.stopPropagation();
          menu.hidden = true;
          more.setAttribute("aria-expanded", "false");
          await deleteConversation(c);
        };

        menu.appendChild(rename);
        menu.appendChild(exportBtn);
        menu.appendChild(del);

        row.appendChild(b);
        row.appendChild(pin);
        row.appendChild(more);
        row.appendChild(menu);
        sessionList.appendChild(row);
      });

      if (!profiles.length) {

        o.value = "";

    function getPageHeight() {
      return Math.max(
        document.documentElement.scrollHeight || 0,
        document.body.scrollHeight || 0
      );
    }

    function getScrollTop() {
      return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
    }

    function isNearBottom(threshold = AUTO_SCROLL_THRESHOLD) {
      const scrollTop = getScrollTop();
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
      const pageHeight = getPageHeight();
      return pageHeight - (scrollTop + viewportHeight) <= threshold;
    }

    function scrollToBottomIfNeeded(force = false) {
      if (!force && !autoScrollEnabled) return;

      // 使用双重 RAF 确保 DOM 完全渲染后再滚动
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const targetScroll = getPageHeight();
          const currentScroll = getScrollTop();

          // 只有当目标位置和当前位置差异明显时才滚动
          if (Math.abs(targetScroll - currentScroll) > 2) {
            window.scrollTo({
              top: targetScroll,
              behavior: "auto"
            });
          }
        });
      });
    }

    function restoreScrollPosition(y) {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const currentScroll = getScrollTop();
          // 只有当目标位置和当前位置差异明显时才滚动
          if (Math.abs(y - currentScroll) > 2) {
            window.scrollTo({
              top: y,
              behavior: "auto"
            });
          }
        });
      });
    }

    function pauseAutoScrollByUser() {
      // 用户一旦触摸/滚轮/按键，就立刻暂停自动跟随
      autoScrollEnabled = false;
      userScrollActive = true;

      if (userScrollTimer) {
        clearTimeout(userScrollTimer);
      }

      // 用户停止操作一小段时间后，如果此时已经在底部附近，才恢复自动跟随
      userScrollTimer = setTimeout(() => {
        userScrollActive = false;
        if (isNearBottom()) {
          autoScrollEnabled = true;
        }
      }, 700);
    }

    function maybeResumeAutoScroll() {
      // 正在触摸/滑动时，不要恢复，否则会继续把用户拖到底部
      if (userScrollActive) return;

      if (isNearBottom()) {
        autoScrollEnabled = true;
      }
    }

    // 移动端主要靠 touchmove；PC/外接键盘靠 wheel/keydown
    window.addEventListener("wheel", pauseAutoScrollByUser, { passive: true });
    window.addEventListener("touchmove", pauseAutoScrollByUser, { passive: true });
    window.addEventListener("pointermove", pauseAutoScrollByUser, { passive: true });

    window.addEventListener("keydown", (e) => {
      const keys = [
        "ArrowUp",
        "ArrowDown",
        "PageUp",
        "PageDown",
        "Home",
        "End",
        " "
      ];

      if (keys.includes(e.key)) {
        pauseAutoScrollByUser();
      }
    }, { passive: true });

    // 只有用户停止交互后，并且重新回到底部附近，才恢复自动跟随
    window.addEventListener("scroll", () => {
      maybeResumeAutoScroll();
    }, { passive: true });


    function renderAll() {
      const c = conversations.find(x => x.id === activeConversationId);
      if (!isWelcomeEmptyConversation()) {
        topTitle.textContent = c && c.title ? c.title : "Claude Web";
      }
      renderSessions();
      renderMessages();
    }

    async function loadConversations() {
      const d = await api("GET", "/api/conversations");
      conversations = d.conversations || [];

      if (!conversations.length) {
        const c = await api("POST", "/api/conversations", { title: "新对话" });
        activeConversationId = c.id;
        return loadConversations();
      }

      const savedConversationId = localStorage.getItem("active_conversation");
      if (!activeConversationId && savedConversationId && conversations.find(c => c.id === savedConversationId)) {
        activeConversationId = savedConversationId;
      }

      if (!activeConversationId || !conversations.find(c => c.id === activeConversationId)) {
        activeConversationId = conversations[0].id;
      }

      localStorage.setItem("active_conversation", activeConversationId);
      await loadMessages();
      renderAll();
    }

    async function loadMessages() {
      const d = await api("GET", `/api/conversations/${activeConversationId}/messages`);
      messages = d.messages || [];
    }

    async function loadProfiles() {
      const d = await api("GET", "/api/profiles");
      profiles = d.profiles || [];

      const saved = localStorage.getItem("active_profile");
      const def = profiles.find(p => p.is_default);
      const found = profiles.find(p => p.id === saved);

      if (found) activeProfileId = found.id;
      else if (def) activeProfileId = def.id;
      else if (profiles.length) activeProfileId = profiles[0].id;
      else activeProfileId = "";

      renderProfiles();
      applyProfile();
    }

    async function sendPrompt() {
      if (sending) {
        if (activeStreamController) activeStreamController.abort();
        return;
      }

      const text = promptEl.value.trim();
      const files = fileInput.files;

      if (!text && (!files || !files.length)) return;

      if (!activeConversationId) {
        const c = await api("POST", "/api/conversations", { title: "新对话" });
        activeConversationId = c.id;
        conversations.unshift({ id: c.id, title: "新对话", created_at: Date.now(), updated_at: Date.now(), is_pinned: 0 });
        localStorage.setItem("active_conversation", activeConversationId);
      }

      sending = true;
      renderSendButtonState();
      setWelcomeMode(false);

      let fileName = null;
      let imagePreview = null;

      if (files && files.length) {
        fileName = Array.from(files).map(f => f.name).join(", ");

        const localImgs = [];
        for (const f of files) {
          if (f.type && f.type.startsWith("image/")) {
            localImgs.push(URL.createObjectURL(f));
          }
        }

        imagePreview = localImgs.length ? localImgs : null;
      }

      messages.push({ role: "user", content: text, fileName, imagePreview });
      messages.push({ role: "assistant", content: "思考中..." });
      lastUserPromptForThinking = text;
      setThinkingContextFromInput(text, files);
      beginStreamingAssistantMessage();

      // 用户主动发送新消息时，强制回到底部，并开启本轮自动跟随
      autoScrollEnabled = true;
      userScrollActive = false;
      renderMessages(true);

      promptEl.value = "";

      const model = apiModel.value.trim() || "claude-opus-4-7";
      const systemPrompt = activeSystemPromptText();
      setModel(model);
      const useWebSearch = webSearchEnabled === true;
      webSearchEnabled = false;
      renderWebSearchButton();
      activeStreamController = new AbortController();

      try {
        let resp;

        if (files && files.length) {
          const form = new FormData();
          form.append("conversation_id", activeConversationId);
          form.append("prompt", text);
          form.append("api_base_url", apiUrl.value.trim());
          form.append("api_auth_token", apiKey.value.trim());
          form.append("api_model", model);
          form.append("api_profile_name", providerName());
          form.append("system_prompt", systemPrompt);
          form.append("web_search", useWebSearch ? "true" : "false");
          form.append("web_search_explicit", useWebSearch ? "true" : "false");

          for (const f of files) form.append("files", f);

          resp = await fetch("/api/chat/upload_stream", {
            method: "POST",
            body: form,
            signal: activeStreamController.signal
          });
        } else {
          resp = await fetch("/api/chat/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            signal: activeStreamController.signal,
            body: JSON.stringify({
              conversation_id: activeConversationId,
              prompt: text,
              web_search: useWebSearch,
              web_search_explicit: useWebSearch,
              api_base_url: apiUrl.value.trim(),
              api_auth_token: apiKey.value.trim(),
              api_model: model,
              api_profile_name: providerName(),
              system_prompt: systemPrompt
            })
          });
        }

        if (!resp.ok) {
          const errorText = await resp.text().catch(() => "");
          throw new Error(`HTTP ${resp.status}: ${errorText || resp.statusText}`);
        }

        if (!resp.body || !resp.body.getReader) {
          const textBody = await resp.text();
          messages[messages.length - 1].content = textBody || "响应为空";
          flushStreamingAssistantUpdate(true);
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let full = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          messages[messages.length - 1].content = full;
          scheduleStreamingAssistantUpdate(full);
        }

        flushStreamingAssistantUpdate(true);

        clearSelectedFiles();

        await loadConversations();
        await loadMessages();
        lastRenderedMsgKey = "";
        renderAll();
      } catch (e) {
        stopStreamingTypewriter(false);
        const aborted = e && (e.name === "AbortError" || String(e).includes("AbortError"));
        messages[messages.length - 1].content = aborted ? "已暂停本次回复。" : "请求失败: " + e;
        lastRenderedMsgKey = "";
        renderMessages();
      } finally {
        sending = false;
        activeStreamController = null;
        renderSendButtonState();
      }
    }

    async function deleteMessageAfter(idx) {
      const msg = messages[idx];
      if (!msg) return;
      if (!confirm("确定删除这条消息以及之后所有消息吗？")) return;

      if (!msg.id) {
        messages = messages.slice(0, idx);
        renderMessages();
        return;
      }

      await api("DELETE", `/api/conversations/${activeConversationId}/messages/${msg.id}/after`);
      await loadMessages();
      renderAll();
    }

    async function regenerateFrom(idx) {
      const msg = messages[idx];
      if (!msg || msg.role !== "assistant" || !msg.id) return;
      if (!confirm("确定重新回答吗？旧回复将保留并可随时查看。")) return;

      sending = true;
      renderSendButtonState();

      // 添加占位消息用于流式输出
      messages.push({ role: "assistant", content: "思考中..." });
      lastUserPromptForThinking = (messages[idx - 1] && messages[idx - 1].role === "user")
        ? (messages[idx - 1].content || "")
        : "";
      setThinkingContextFromInput(lastUserPromptForThinking, [], { regenerate: true });
      beginStreamingAssistantMessage();

      // 用户主动重新生成时，强制回到底部，并开启本轮自动跟随
      autoScrollEnabled = true;
      userScrollActive = false;
      renderMessages(true);

      try {
        activeStreamController = new AbortController();
        const resp = await fetch("/api/chat/regenerate_from_stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: activeStreamController.signal,
          body: JSON.stringify({
            conversation_id: activeConversationId,
            message_id: msg.id,
            keep_old: true,
            api_base_url: apiUrl.value.trim(),
            api_auth_token: apiKey.value.trim(),
            api_model: apiModel.value.trim() || "claude-opus-4-7",
            api_profile_name: providerName(),
            system_prompt: activeSystemPromptText(),
            web_search: webSearchEnabled,
            web_search_explicit: webSearchEnabled
          })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let full = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          messages[messages.length - 1].content = full;
          scheduleStreamingAssistantUpdate(full);
        }

        flushStreamingAssistantUpdate(true);

        await loadMessages();
        lastRenderedMsgKey = "";
        renderAll();
      } catch (e) {
        stopStreamingTypewriter(false);
        const aborted = e && (e.name === "AbortError" || String(e).includes("AbortError"));
        messages[messages.length - 1].content = aborted ? "已暂停本次回复。" : "重新生成失败: " + e;
        lastRenderedMsgKey = "";
        renderMessages();
      } finally {
        sending = false;
        activeStreamController = null;
        renderSendButtonState();
      }
    }

    function openDrawer() {
      drawer.classList.add("open");
      overlay.classList.add("open");
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      overlay.classList.remove("open");
    }

    function exportConversation(conversationId) {
      if (!conversationId) {
        alert("当前没有可导出的对话");
        return;
      }
      const a = document.createElement("a");
      a.href = `/api/conversations/${conversationId}/export.md`;
      a.download = "";
      a.rel = "noopener";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function exportActiveConversation() {
      exportConversation(activeConversationId);
    }

    async function renameConversation(conversation) {
      if (!conversation || !conversation.id) return;
      const title = prompt("新名称", conversation.title || "");
      if (!title) return;
      await api("POST", `/api/conversations/${conversation.id}/rename`, { title });
      await loadConversations();
    }

    async function deleteConversation(conversation) {
      if (!conversation || !conversation.id) return;
      if (!confirm("确定删除这个对话吗？")) return;
      await api("DELETE", `/api/conversations/${conversation.id}`);
      if (conversation.id === activeConversationId) {
        activeConversationId = null;
      }
      await loadConversations();
    }

    $("openDrawer").onclick = openDrawer;
    $("closeDrawer").onclick = closeDrawer;
    overlay.onclick = closeDrawer;
    sessionSearch.oninput = renderSessions;

    $("newConvBtn").onclick = async () => {
      const c = await api("POST", "/api/conversations", { title: "新对话" });
      activeConversationId = c.id;
      await loadConversations();
      closeDrawer();
    };

    shareBtn.onclick = exportActiveConversation;

    modelChoices.onclick = e => {
      const btn = e.target.closest(".model-choice");
      if (!btn) return;
      if (btn.dataset.model === "custom") {
        customModelBox.style.display = "block";
        apiModel.focus();
      } else {
        setModel(btn.dataset.model);
      }
    };

    toggleModelListBtn.onclick = () => {
      setModelChoicesCollapsed(!modelChoices.classList.contains("model-choices-collapsed"));
    };

    fetchModelsBtn.onclick = fetchModelsFromProvider;

    fetchedModelsList.onclick = e => {
      const btn = e.target.closest(".fetched-model-btn");
      if (!btn) return;
      const model = btn.dataset.model;
      addModelChoiceButton(model);
      setModel(model);
      fetchModelsStatus.textContent = "已选择模型：" + model;
      fetchModelsStatus.className = "fetch-models-status good";
    };

    apiModel.oninput = () => setModel(apiModel.value.trim() || "claude-opus-4-7");

    modelPill.onclick = openDrawer;

    profileSelect.onchange = () => {
      activeProfileId = profileSelect.value;
      applyProfile();
    };

    $("newProfileBtn").onclick = () => {
      activeProfileId = "";
      profileSelect.value = "";
      profileName.value = "";
      apiUrl.value = "";
      apiKey.value = "";
    };

    $("saveProfileBtn").onclick = async () => {
      const body = {
        name: profileName.value.trim() || "未命名",
        base_url: apiUrl.value.trim(),
        auth_token: apiKey.value.trim(),
        model: apiModel.value.trim() || "claude-opus-4-7",
        is_default: false
      };

      let d;
      if (activeProfileId) d = await api("PUT", `/api/profiles/${activeProfileId}`, body);
      else d = await api("POST", "/api/profiles", body);

      activeProfileId = d.id || activeProfileId;
      await loadProfiles();
    };

    $("defaultProfileBtn").onclick = async () => {
      if (!activeProfileId) return;
      await api("POST", `/api/profiles/${activeProfileId}/default`);
      await loadProfiles();
    };

    $("deleteProfileBtn").onclick = async () => {
      if (!activeProfileId) return;
      if (!confirm("确定删除当前接入商吗？")) return;
      await api("DELETE", `/api/profiles/${activeProfileId}`);
      activeProfileId = "";
      await loadProfiles();
    };

    newSystemPromptBtn.onclick = () => openSystemPromptEditor();
    systemPromptEditorSave.onclick = saveSystemPromptFromEditor;
    systemPromptEditorCancel.onclick = closeSystemPromptEditor;
    systemPromptEditorDelete.onclick = deleteSystemPromptFromEditor;
    systemPromptEditor.addEventListener("click", e => {
      if (e.target === systemPromptEditor) closeSystemPromptEditor();
    });

    function clearSelectedFiles() {
      fileInput.value = "";
      fileInfo.textContent = "";
      preview.innerHTML = "";
      clearFilesBtn.style.display = "none";
      document.body.classList.remove("has-files");
    }

    $("plusBtn").onkeydown = e => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        fileInput.click();
      }
    };
    clearFilesBtn.onclick = clearSelectedFiles;

    fileInput.onchange = () => {
      const files = fileInput.files;
      if (!files || !files.length) {
        clearSelectedFiles();
        return;
      }

      document.body.classList.add("has-files");
      clearFilesBtn.style.display = "inline-block";

      fileInfo.textContent = "已选择 " + files.length + " 个文件：" + Array.from(files).map(f => f.name).join(", ");
      preview.innerHTML = "";

      Array.from(files).forEach(f => {
        if (f.type && f.type.startsWith("image/")) {
          const img = document.createElement("img");
          img.src = URL.createObjectURL(f);
          preview.appendChild(img);
        }
      });
    };


    codePreviewCloseBtn.onclick = closeCodePreview;

    codePreviewBackdrop.addEventListener("click", e => {
      if (e.target === codePreviewBackdrop) closeCodePreview();
    });

    codePreviewCopyBtn.onclick = async () => {
      if (!activeCodePreview) return;
      const text = activeCodePreview.renderable ? activeCodePreview.html : activeCodePreview.text;
      await copyTextFromButton(codePreviewCopyBtn, text);
    };

    codePreviewOpenBtn.onclick = () => {
      if (!activeCodePreview || !activeCodePreview.renderable) return;
      const blob = new Blob([activeCodePreview.html], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank", "noopener,noreferrer");
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    };

    sendBtn.onclick = sendPrompt;

    // 输入框回车只换行，不发送消息。
    // 发送消息只通过右侧发送按钮触发。
    promptEl.addEventListener("input", updateWelcomeInputState);

    promptEl.onkeydown = e => {
      if (e.key === "Enter") {
        return;
      }
    };

    if (webSearchBtn) {
      webSearchBtn.onclick = () => {
        webSearchEnabled = !webSearchEnabled;
        renderWebSearchButton();
      };
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && systemPromptEditor.classList.contains("open")) {
        closeSystemPromptEditor();
        return;
      }
      if (e.key === "Escape" && codePreviewBackdrop && codePreviewBackdrop.classList.contains("open")) {
        closeCodePreview();
        return;
      }
      if (e.key === "Escape" && conversationSearchPanel && !conversationSearchPanel.hidden) {
        closeConversationSearch();
        return;
      }
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "f") {
        e.preventDefault();
        openConversationSearch();
      }
    });

    if (conversationSearchToggle) {
      conversationSearchToggle.onclick = () => {
        if (conversationSearchPanel && !conversationSearchPanel.hidden) closeConversationSearch();
        else openConversationSearch();
      };
    }

    if (conversationSearchClose) {
      conversationSearchClose.onclick = closeConversationSearch;
    }

    if (conversationSearchInput) {
      conversationSearchInput.addEventListener("input", runConversationSearchDebounced);
      conversationSearchInput.addEventListener("keydown", e => {
        if (e.key === "Enter") runSearch("conversation");
      });
    }

    if (globalContentSearch) {
      globalContentSearch.addEventListener("input", runGlobalSearchDebounced);
      globalContentSearch.addEventListener("keydown", e => {
        if (e.key === "Enter") runSearch("global");
      });
    }

    function findMsgIdxById(msgId) {
      for (let i = 0; i < messages.length; i++) {
        if (getMessageId(messages[i]) === String(msgId)) return i;
      }
      return -1;
    }

    function findMessageByButton(btn) {
      const msgId = btn.dataset.msgId || "";
      if (msgId) {
        const idx = findMsgIdxById(msgId);
        if (idx >= 0) return { msg: messages[idx], idx };
      }

      const idx = Number(btn.dataset.idx);
      if (Number.isInteger(idx) && idx >= 0 && idx < messages.length) {
        return { msg: messages[idx], idx };
      }

      return { msg: null, idx: -1 };
    }

    function markCopied(btn) {
      btn.classList.add("copied");
      setTimeout(() => {
        btn.classList.remove("copied");
      }, 1500);
    }

    async function copyTextFromButton(copyBtn, text) {
      if (!text) return;

      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
        markCopied(copyBtn);
      } catch (_) {}
    }

    chatList.onclick = e => {
      const codeFoldBtn = e.target.closest(".code-fold-btn");
      if (codeFoldBtn) {
        const pre = codeFoldBtn.closest("pre");
        if (!pre) return;
        pre.classList.toggle("code-collapsed");
        codeFoldBtn.textContent = pre.classList.contains("code-collapsed") ? "展开" : "折叠";
        return;
      }

      const messageFoldBtn = e.target.closest(".message-fold-btn");
      if (messageFoldBtn) {
        const wrap = messageFoldBtn.closest(".msg-wrap");
        const bubble = wrap && wrap.querySelector(".bubble");
        if (!wrap || !bubble) return;

        const key = wrap.dataset.msgId || messageFoldBtn.dataset.msgId || messageFoldBtn.dataset.idx || "";
        const collapsed = !bubble.classList.contains("message-collapsed");

        bubble.classList.toggle("message-collapsed", collapsed);
        if (collapsed) {
          collapsedMessageKeys.add(key);
          delete bubble.dataset.userExpanded;
        } else {
          collapsedMessageKeys.delete(key);
          bubble.dataset.userExpanded = "1";
        }
        updateMessageFoldButton(messageFoldBtn, collapsed);
        return;
      }

      const del = e.target.closest(".delete-msg");
      if (del) {
        const found = findMessageByButton(del);
        if (found.idx >= 0) return deleteMessageAfter(found.idx);
        return;
      }

      const regen = e.target.closest(".regen-msg");
      if (regen) {
        const found = findMessageByButton(regen);
        if (found.idx >= 0) return regenerateFrom(found.idx);
        return;
      }

      const copyBtn = e.target.closest(".copy-msg");
      if (copyBtn) {
        const found = findMessageByButton(copyBtn);
        const text = found.msg ? (found.msg.content || "").trim() : "";
        copyTextFromButton(copyBtn, text);
        return;
      }

      const versionToggle = e.target.closest(".version-toggle-btn");
      if (versionToggle) {
        const versionSection = versionToggle.closest(".version-section");
        if (versionSection) {
          const container = versionSection.querySelector(".alt-versions-container");
          if (container) {
            const willOpen = container.hidden;
            container.hidden = !willOpen;
            versionToggle.textContent = willOpen
              ? versionToggle.dataset.openText
              : versionToggle.dataset.closedText;
          }
        }
        return;
      }

      const citation = e.target.closest(".source-citation");
      if (citation && citation.href) {
        return;
      }
    };

    async function initPage() {
      const seq = ++loadSeq;
      chatList.innerHTML = '<div class="empty">加载中...</div>';
      const fallbackTimer = setTimeout(() => {
        if (seq === loadSeq && chatList.textContent.includes("加载中")) {
          showLoadError("页面初始化超时，请点击重试");
        }
      }, 8000);

      try {
        await loadProfiles();
        await loadSystemPrompts();
        if (seq !== loadSeq) return;
        restoreModel();
        loadProviderModels();
        setModelChoicesCollapsed(localStorage.getItem("model_choices_collapsed") !== "0");
        await loadConversations();
      } catch (e) {
        if (seq === loadSeq) showLoadError(e.message || String(e));
      } finally {
        clearTimeout(fallbackTimer);
      }
    }

    initPage();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/static/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
