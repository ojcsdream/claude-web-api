<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Claude Web</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">

  <style>
    :root {
      --bg: #1f1f1d;
      --text: #f0ece3;
      --muted: #9c968c;
      --line: rgba(255,255,255,0.10);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family:
        ui-serif, Georgia, "Times New Roman",
        "Songti SC", "Noto Serif CJK SC", "Source Han Serif SC", serif;
    }

    body { min-height: 100vh; overflow-x: hidden; }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      height: 64px; padding: 0 16px;
      display: flex; align-items: center; gap: 12px;
      background: rgba(31,31,29,0.96);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .icon-btn {
      width: 40px; height: 40px; border: 0;
      background: transparent; color: #d8d3c8;
      font-size: 22px; border-radius: 10px;
      cursor: pointer;
    }

    .icon-btn:active { background: rgba(255,255,255,0.06); }

    .title {
      flex: 1; font-size: 17px; font-weight: 700; color: #e8e2d5;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    }

    .share-btn {
      border: 1px solid rgba(255,255,255,0.14);
      background: transparent; color: #f0ece3;
      height: 38px; padding: 0 16px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    }

    .wrap {
      max-width: 760px; margin: 0 auto;
      padding: 80px 18px 260px;
    }

    #chatList {
      display: flex; flex-direction: column; gap: 26px;
    }

    .empty {
      color: #64748b; text-align: center;
      padding: 30vh 12px 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    }

    .msg-wrap {
      display: flex; flex-direction: column; gap: 6px;
    }
    .msg-wrap.user { align-items: flex-end; }
    .msg-wrap.assistant { align-items: flex-start; }

    .msg { display: flex; width: 100%; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 94%;
      line-height: 1.8;
      word-break: break-word;
      overflow-x: auto;
    }

    .user .bubble {
      max-width: min(84%, 540px);
      background: #11110f;
      color: #f5f1e8;
      border-radius: 18px;
      padding: 12px 16px;
      font-size: 16px;
      line-height: 1.55;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    }

    .assistant .bubble {
      color: #eee9df;
      font-size: 18px;
      line-height: 1.85;
    }

    .assistant .bubble p { margin: 0.55em 0; }
    .assistant .bubble pre {
      background: #111110;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 14px;
      overflow-x: auto;
      font-size: 14px;
    }

    .assistant .bubble code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .file-chip {
      margin-top: 8px; display: inline-block;
      padding: 5px 10px; border-radius: 999px;
      background: rgba(255,255,255,0.10);
      font-size: 13px; color: #dbd3c3;
    }

    .user-upload { margin-top: 8px; }
    .user-upload img {
      max-width: 220px; max-height: 220px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .msg-actions {
      opacity: 0.5; display: flex; gap: 6px;
      transition: opacity 0.18s ease;
      padding: 2px 0;
    }

    .msg-wrap:hover .msg-actions,
    .msg-wrap:active .msg-actions { opacity: 1; }

    .delete-msg-btn, .regen-btn {
      width: 30px; height: 30px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.035);
      color: #a99f93;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer;
    }

    .delete-msg-btn:active {
      background: rgba(127,29,29,0.22);
      color: #e0a199;
    }

    .regen-btn { font-size: 17px; margin-left: 4px; }

    .thinking {
      display: inline-flex; align-items: center; gap: 8px;
      color: #eee7d8;
    }

    .thinking span {
      width: 6px; height: 6px; border-radius: 999px;
      background: #f5ead8; opacity: 0.55;
      animation: dot 1.2s infinite ease-in-out;
    }

    .thinking span:nth-child(2) { animation-delay: 0.15s; }
    .thinking span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dot {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    .composer {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 25;
      padding: 10px 12px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(31,31,29,0), rgba(31,31,29,0.92) 20%, rgba(31,31,29,0.98));
    }

    .composer-inner {
      max-width: 760px; margin: 0 auto;
      background: #2f2f2c;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 26px;
      padding: 10px 10px 8px;
    }

    textarea {
      width: 100%; min-height: 46px; max-height: 160px;
      border: 0; background: transparent; color: #f0ece3;
      padding: 8px 10px; outline: none; resize: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 17px; line-height: 1.4;
    }

    .composer-toolbar {
      display: flex; align-items: center; gap: 6px; padding: 0 4px;
    }

    .plus-btn {
      width: 40px; height: 40px; border: 0;
      background: transparent; color: #d8d3c8;
      font-size: 28px; line-height: 1; padding: 0;
      border-radius: 999px; cursor: pointer;
    }

    .plus-btn:active { background: rgba(255,255,255,0.05); }

    #fileInput { display: none; }

    .model-pill {
      flex: 1;
      text-align: center;
      color: #bdb6aa;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      background: transparent; border: 0;
      cursor: pointer;
    }

    #sendBtn {
      width: 40px; height: 40px; border-radius: 999px;
      border: 0; background: #ece5d7; color: #1f1f1d;
      font-size: 22px; font-weight: 800;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    #sendBtn:disabled { opacity: 0.45; }
    #sendBtn:active { background: #d8d1c5; transform: scale(0.94); }

    .filename {
      color: #93c5fd; font-size: 12px; padding: 4px 6px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    }

    .preview {
      padding: 4px 6px 0;
    }
    .preview img {
      max-width: 88px; max-height: 88px;
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.10);
    }

    /* drawer */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 80;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }

    .side-drawer {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: min(86vw, 340px);
      background: #262623;
      border-right: 1px solid rgba(255,255,255,0.08);
      z-index: 90;
      transform: translateX(-105%);
      transition: transform 0.22s ease;
      padding: 16px 14px calc(22px + env(safe-area-inset-bottom));
      overflow-y: auto;
    }
    .side-drawer.open { transform: translateX(0); }

    .drawer-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 18px;
    }

    .drawer-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 20px; font-weight: 750; color: #f0ece3;
    }

    .drawer-subtitle {
      margin-top: 4px; font-size: 12px; color: #9c968c;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    }

    .drawer-close {
      width: 36px; height: 36px; border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: #d8d3c8;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 22px; line-height: 1; cursor: pointer;
    }

    .drawer-section { margin-bottom: 20px; }

    .drawer-label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 11px; color: #8d877d;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sessions { display: flex; flex-direction: column; gap: 6px; }

    .session-item {
      text-align: left;
      padding: 10px 12px;
      border-radius: 12px;
      background: transparent;
      color: #d8d3c8;
      border: 1px solid transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 14px;
      cursor: pointer;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .session-item.active {
      background: rgba(255,255,255,0.075);
      border-color: rgba(255,255,255,0.08);
      color: #fffaf0;
    }

    .new-session-btn {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.10);
      color: #dbd3c3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 14px; cursor: pointer; text-align: center;
    }

    .drawer-section label {
      display: block;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 12px; color: #9c968c; margin: 0 0 6px;
    }

    .drawer-section input, .drawer-section select {
      width: 100%; min-height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      background: #1f1f1d; color: #f0ece3;
      padding: 0 12px; font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      outline: none;
    }

    .field { margin-bottom: 10px; }

    .model-choices {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }

    .model-choice {
      min-height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.10);
      color: #dbd3c3;
      font-size: 13px;
      padding: 8px 10px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      cursor: pointer;
    }

    .model-choice.active {
      background: rgba(255,255,255,0.14);
      color: #fff7ea;
      border-color: rgba(255,255,255,0.22);
    }

    #customModelBox { display: none; margin-top: 8px; }

    .actions-row {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    }

    .actions-row button {
      flex: 1;
      min-height: 36px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: #d8d3c8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 13px; cursor: pointer;
    }

    .actions-row button.danger {
      color: #e0a199;
    }

    body::after {
      content: "Claude is AI and can make mistakes. Please double-check responses.";
      position: fixed; left: 18px; right: 18px;
      bottom: calc(4px + env(safe-area-inset-bottom));
      z-index: 26;
      text-align: center;
      color: #8b867d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      font-size: 11px; opacity: 0.7;
      pointer-events: none;
    }
  
    .clear-files-btn {
      display: none;
      margin: 4px 6px 0;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.045);
      color: #cfc7b8;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    }

    .clear-files-btn:active {
      background: rgba(127,29,29,0.18);
      color: #e0a199;
    }

  
    /* Better math rendering */
    .katex {
      font-size: 1.05em !important;
      color: #f4efe6 !important;
    }

    .katex-display {
      margin: 1em 0 !important;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.45em 0.2em;
    }

    .assistant .bubble .math-block {
      font-size: 18px;
      line-height: 1.6;
      overflow-x: auto;
      margin: 1em 0;
    }

    .assistant .bubble mjx-container,
    .assistant .bubble .katex-display {
      max-width: 100%;
      overflow-x: auto;
    }

    .assistant .bubble pre:has(code.language-math),
    .assistant .bubble pre:has(code.language-latex),
    .assistant .bubble pre:has(code.language-tex) {
      background: transparent !important;
      border: 0 !important;
      padding: 0 !important;
    }

    .regen-btn {
      opacity: 0.9;
    }

  

  
    /* MathJax CHTML mobile stable rendering */
    mjx-container {
      color: #f4efe6 !important;
      max-width: 100% !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
      line-height: 1.4 !important;
    }

    mjx-container[display="true"] {
      display: block !important;
      text-align: center !important;
      margin: 1em 0 !important;
      padding: 0.35em 0.1em !important;
      font-size: 102% !important;
    }

    mjx-container * {
      max-width: none !important;
    }

    .assistant .bubble {
      overflow-x: hidden;
    }

    .assistant .bubble .math-block {
      margin: 1em 0;
      overflow-x: auto;
    }

  
    .profile-test-result {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.5;
      color: #9c968c;
      word-break: break-word;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    }

    .profile-test-result.good {
      color: #a7d8a7;
    }

    .profile-test-result.bad {
      color: #e0a199;
    }

    .fetched-models {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 240px;
      overflow-y: auto;
    }

    .fetched-model-btn {
      text-align: left;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: #d8d3c8;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      word-break: break-all;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
    }

    .fetched-model-btn:active {
      background: rgba(255,255,255,0.10);
    }

  
    .answer-meta {
      margin-top: 12px;
      color: #8f887d;
      font-size: 12px;
      line-height: 1.4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", sans-serif;
      opacity: 0.78;
    }

    .answer-meta::before {
      content: "使用 ";
      opacity: 0.65;
    }

  </style>



<style id="remove-auto-model-panel">
  #autoModelPanel,
  .auto-model-panel,
  #autoModelList,
  .auto-model-list,
  .auto-model-btn,
  #autoModelRefreshBtn,
  .auto-model-refresh,
  #autoModelStatus,
  .auto-model-status {
    display: none !important;
  }

  /* 恢复旧模型按钮区域显示 */
  #modelChoices,
  .model-choices {
    display: grid !important;
  }

  #testProfileBtn,
  #fetchModelsBtn,
  #profileTestResult,
  #fetchedModels {
    display: initial !important;
  }
</style>




<style id="legacy-model-ui-shim-style">
  #legacyModelUiShim,
  #testProfileBtn,
  #fetchModelsBtn,
  #profileTestResult,
  #fetchedModels {
    display: none !important;
  }
</style>

</head>
<body>

<!-- legacy-model-ui-shim-start -->
<div id="legacyModelUiShim" style="display:none!important;">
  <button id="testProfileBtn" type="button"></button>
  <button id="fetchModelsBtn" type="button"></button>
  <div id="profileTestResult"></div>
  <div id="fetchedModels"></div>
</div>
<!-- legacy-model-ui-shim-end -->

  <div class="topbar">
    <button id="drawerOpenBtn" class="icon-btn" title="打开抽屉">☰</button>
    <div class="title" id="topTitle">Claude Web</div>
    <button id="shareBtn" class="share-btn">Share</button>
  </div>

  <div id="drawerOverlay" class="drawer-overlay"></div>
  <aside id="sideDrawer" class="side-drawer">
    <div class="drawer-head">
      <div>
        <div class="drawer-title">Claude Web</div>
        <div class="drawer-subtitle">对话与 API 配置</div>
      </div>
      <button id="drawerCloseBtn" class="drawer-close">×</button>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">对话</div>
      <div class="sessions" id="sessionList"></div>
      <button class="new-session-btn" id="newSessionBtn">+ 新对话</button>

      <div class="actions-row" style="margin-top:12px;">
        <button id="renameBtn">重命名</button>
        <button id="exportBtn">导出</button>
        <button id="deleteConvBtn" class="danger">删除</button>
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">模型</div>
      <div class="model-choices" id="modelChoices">
        <button class="model-choice active" data-model="claude-opus-4-7">Opus 4.7</button>
        <button class="model-choice" data-model="claude-opus-4-6">Opus 4.6</button>
        <button class="model-choice" data-model="claude-sonnet-4-6">Sonnet 4.6</button>
        <button class="model-choice" data-model="gpt-5.5">GPT-5.5</button>
        <button class="model-choice" data-model="custom">自定义</button>
      </div>
      <div id="customModelBox" class="field" style="margin-top:10px;">
        <label for="apiModel">模型 ID</label>
        <input id="apiModel" type="text" value="claude-opus-4-7" />
      </div>
    </div>

    <div class="drawer-section">
      <div class="drawer-label">API</div>

      <div class="field">
        <label for="apiProfileSelect">接入商</label>
        <select id="apiProfileSelect"></select>
      </div>

      <div class="field">
        <label for="apiProfileName">名称</label>
        <input id="apiProfileName" type="text" placeholder="例如 DeepKey" />
      </div>

      <div class="field">
        <label for="apiBaseUrl">API URL</label>
        <input id="apiBaseUrl" type="text" placeholder="https://deepkey.top" />
      </div>

      <div class="field">
        <label for="apiAuthToken">API Key</label>
        <input id="apiAuthToken" type="password" />
      </div>

      <div class="actions-row">
        <button id="newProfileBtn">新增</button>
        <button id="saveProfileBtn">保存</button>
        <button id="testProfileBtn">测试</button>
        <button id="fetchModelsBtn">拉取模型</button>
        <button id="defaultProfileBtn">设默认</button>
        <button id="deleteProfileBtn" class="danger">删除</button>
      </div>
      <div id="profileTestResult" class="profile-test-result"></div>
      <div id="fetchedModels" class="fetched-models"></div>
    </div>
  </aside>

  <div class="wrap">
    <div id="chatList">
      <div class="empty">加载中...</div>
    </div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <textarea id="prompt" placeholder="Write a message..."></textarea>

      <div id="filename" class="filename"></div>
      <div id="preview" class="preview"></div>
      <button id="clearFilesBtn" class="clear-files-btn" type="button">取消附件</button>

      <div class="composer-toolbar">
        <button class="plus-btn" id="plusBtn" title="附件">+</button>
        <input id="fileInput" type="file" multiple accept=".txt,.md,.py,.js,.ts,.json,.log,.yaml,.yml,.toml,.csv,.xml,.html,.htm,.css,.c,.cpp,.h,.java,.go,.rs,.rb,.php,.sh,.bat,.ps1,.sql,.r,.swift,.kt,.dart,.lua,.pl,.ini,.cfg,.conf,.env,.dockerfile,.makefile,.gradle,.properties,.tex,.bib,.rst,.org,.png,.jpg,.jpeg,.webp,.gif,.bmp,.svg,.pdf" />

        <button class="model-pill" id="modelPill">Opus 4.7⌄</button>

        <button id="sendBtn" title="发送">↑</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]],

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <script>
    const chatListEl = document.getElementById("chatList");
    const topTitleEl = document.getElementById("topTitle");

    const drawerOpenBtn = document.getElementById("drawerOpenBtn");
    const drawerCloseBtn = document.getElementById("drawerCloseBtn");
    const drawerOverlay = document.getElementById("drawerOverlay");
    const sideDrawer = document.getElementById("sideDrawer");

    const sessionListEl = document.getElementById("sessionList");
    const newSessionBtn = document.getElementById("newSessionBtn");
    const renameBtn = document.getElementById("renameBtn");
    const exportBtn = document.getElementById("exportBtn");
    const deleteConvBtn = document.getElementById("deleteConvBtn");

    const modelChoicesEl = document.getElementById("modelChoices");
    const customModelBoxEl = document.getElementById("customModelBox");
    const apiModelEl = document.getElementById("apiModel");
    const modelPillEl = document.getElementById("modelPill");

    const apiProfileSelectEl = document.getElementById("apiProfileSelect");
    const apiProfileNameEl = document.getElementById("apiProfileName");
    const apiBaseUrlEl = document.getElementById("apiBaseUrl");
    const apiAuthTokenEl = document.getElementById("apiAuthToken");

    const newProfileBtn = document.getElementById("newProfileBtn");
    const saveProfileBtn = document.getElementById("saveProfileBtn");
    const testProfileBtn = document.getElementById("testProfileBtn");
    const fetchModelsBtn = document.getElementById("fetchModelsBtn");
    const defaultProfileBtn = document.getElementById("defaultProfileBtn");
    const deleteProfileBtn = document.getElementById("deleteProfileBtn");
    const profileTestResultEl = document.getElementById("profileTestResult");
    const fetchedModelsEl = document.getElementById("fetchedModels");

    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const plusBtn = document.getElementById("plusBtn");
    const fileInputEl = document.getElementById("fileInput");
    const filenameEl = document.getElementById("filename");
    const previewEl = document.getElementById("preview");
    const clearFilesBtn = document.getElementById("clearFilesBtn");
    const shareBtn = document.getElementById("shareBtn");

    let conversations = [];
    let activeConversationId = null;
    let messages = [];
    let apiProfiles = [];
    let activeProfileId = "";
    let sending = false;

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text || "";
      return d.innerHTML;
    }


      const saved = loadSavedModels();
      if (!saved.includes(model) && !BUILTIN_MODELS.some(x => x.id === model)) {
        saved.push(model);
        saveSavedModels(saved);
      }

      apiModelEl.value = model;
      rememberCurrentModel();
      updateModelUI();
      await loadProfiles();
      await loadConversations();
      closeDrawer();
    }

    async function deleteConversation() {
      if (!activeConversationId) return;
      const cur = conversations.find(c => c.id === activeConversationId);
      const title = cur && cur.title ? cur.title : "当前对话";
      if (!confirm(`确定删除「${title}」吗？此操作不可恢复。`)) return;
      await api("DELETE", `/api/conversations/${activeConversationId}`);
      activeConversationId = null;
      await loadConversations();
    }

    async function renameConversation() {
      if (!activeConversationId) return;
      const cur = conversations.find(c => c.id === activeConversationId);
      const t = prompt("请输入新的对话名称", cur ? cur.title : "");
      if (t === null) return;
      const title = t.trim();
      if (!title) return;
      await api("POST", `/api/conversations/${activeConversationId}/rename`, { title });
      await loadConversations();
    }

    async function deleteMessageAndAfter(index) {
      const msg = messages[index];
      if (!msg) return;
      if (!confirm("确定删除这条消息以及它之后的所有消息吗？此操作不可恢复。")) return;

      if (!msg.id) {
        messages = messages.slice(0, index);
        renderAll();
        return;
      }

      const data = await api("DELETE", `/api/conversations/${activeConversationId}/messages/${msg.id}/after`);
      if (!data.ok) {
        alert(data.message || "删除失败");
        return;
      }
      await loadMessages();
      renderAll();
    }

    function getCurrentModel() {
      return apiModelEl.value.trim() || "claude-opus-4-7";
    }

    function getProviderName() {
      const name = apiProfileNameEl.value.trim();
      if (name) return name;

      const url = apiBaseUrlEl.value.trim();
      if (url) return url;

      return "当前接入商";
    }

    function currentProfileModelKey() {
      const id = apiProfileSelectEl ? apiProfileSelectEl.value : "";
      return id ? "claude_web_recent_model_for_profile_" + id : "";
    }

    function saveRecentModelForProfile() {
      const model = getCurrentModel();
      if (!model) return;

      try {
        localStorage.setItem("claude_web_recent_model_global", model);
        const key = currentProfileModelKey();
        if (key) localStorage.setItem(key, model);
      } catch (e) {}
    }

    function restoreRecentModelForProfile() {
      try {
        const key = currentProfileModelKey();
        const per = key ? localStorage.getItem(key) : "";
        const global = localStorage.getItem("claude_web_recent_model_global") || "";
        const model = per || global || apiModelEl.value.trim();

        if (model) {
          apiModelEl.value = model;
          updateModelUI();
        }
      } catch (e) {}
    }

    async function sendPrompt() {
      if (sending) return;
      if (!activeConversationId) return;

      const prompt = promptEl.value.trim();
      const files = fileInputEl.files;

      if (!prompt && (!files || !files.length)) return;

      sending = true;
      sendBtn.disabled = true;

      let imagePreview = null;
      let fileName = null;

      if (files && files.length) {
        const names = Array.from(files).map(f => f.name);
        fileName = names.join(", ");

        for (const f of files) {
          if (f.type && f.type.startsWith("image/")) {
            imagePreview = URL.createObjectURL(f);
            break;
          }
        }
      }

      messages.push({
        role: "user",
        content: prompt || "",
        fileName,
        imagePreview
      });

      messages.push({
        role: "assistant",
        content: "思考中..."
      });

      renderAll();
      promptEl.value = "";

      const apiBaseUrl = apiBaseUrlEl.value.trim();
      const apiAuthToken = apiAuthTokenEl.value.trim();
      const apiModel = getCurrentModel();
      saveRecentModelForProfile();

      try {
        let resp;

        if (files && files.length) {
          const form = new FormData();

          form.append("conversation_id", activeConversationId);
          form.append("prompt", prompt);
          form.append("api_base_url", apiBaseUrl);
          form.append("api_auth_token", apiAuthToken);
          form.append("api_model", apiModel);
          form.append("api_profile_name", getProviderName());

          for (const f of files) {
            form.append("files", f);
          }

          resp = await fetch("/api/chat/upload_stream", {
            method: "POST",
            body: form
          });
        } else {
          resp = await fetch("/api/chat/stream", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              conversation_id: activeConversationId,
              prompt,
              api_base_url: apiBaseUrl,
              api_auth_token: apiAuthToken,
              api_model: apiModel,
              api_profile_name: getProviderName()
            })
          });
        }

        if (!resp.ok || !resp.body) {
          messages[messages.length - 1].content = "请求失败";
          renderAll();
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let full = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          full += decoder.decode(value, { stream: true });
          messages[messages.length - 1].content = full;
          renderAll();
        }

        messages[messages.length - 1].content = full || "(无输出)";
        renderAll();

        clearSelectedFiles();

        await loadConversations();
        await loadMessages();
        renderAll();
      } catch (e) {
        messages[messages.length - 1].content = "请求失败: " + e;
        renderAll();
      } finally {
        sending = false;
        sendBtn.disabled = false;
      }
    }

    async function regenerateFromMessage(index) {
      if (sending) return;
      if (!activeConversationId) return;

      const msg = messages[index];
      if (!msg || msg.role !== "assistant") return;

      if (!confirm("确定从这里重新回答吗？这条回复以及它之后的所有消息都会被删除。")) return;

      sending = true;
      sendBtn.disabled = true;

      // 前端先截断到目标助手消息之前，然后插入 thinking
      messages = messages.slice(0, index);
      messages.push({
        role: "assistant",
        content: "思考中..."
      });
      renderAll();

      try {
        const resp = await fetch("/api/chat/regenerate_from_stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            conversation_id: activeConversationId,
            message_id: msg.id,
            api_base_url: apiBaseUrlEl.value.trim(),
            api_auth_token: apiAuthTokenEl.value.trim(),
            api_model: getCurrentModel(),
            api_profile_name: getProviderName()
          })
        });

        if (!resp.ok || !resp.body) {
          messages[messages.length - 1].content = "重新回答失败";
          renderAll();
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let full = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          messages[messages.length - 1].content = full;
          renderAll();
        }

        messages[messages.length - 1].content = full || "(无输出)";
        renderAll();

        await loadConversations();
        await loadMessages();
        renderAll();
      } catch (e) {
        messages[messages.length - 1].content = "重新回答失败: " + e;
        renderAll();
      } finally {
        sending = false;
        sendBtn.disabled = false;
      }
    }

    async function regenerate() {
      if (sending) return;
      if (!activeConversationId) return;

      sending = true;
      sendBtn.disabled = true;

      for (let i = messages.length - 1; i >= 0; i--) {
        if (messages[i].role === "assistant") {
          messages.splice(i, 1);
          break;
        }
      }
      messages.push({ role: "assistant", content: "思考中..." });
      renderAll();

      try {
        const resp = await fetch("/api/chat/regenerate_stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            conversation_id: activeConversationId,
            api_base_url: apiBaseUrlEl.value.trim(),
            api_auth_token: apiAuthTokenEl.value.trim(),
            api_model: getCurrentModel(),
            api_profile_name: getProviderName()
          })
        });

        if (!resp.ok || !resp.body) {
          messages[messages.length - 1].content = "重新回答失败";
          renderAll();
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let full = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          messages[messages.length - 1].content = full;
          renderAll();
        }

        messages[messages.length - 1].content = full || "(无输出)";
        renderAll();

        await loadMessages();
        renderAll();
      } catch (e) {
        messages[messages.length - 1].content = "重新回答失败: " + e;
        renderAll();
      } finally {
        sending = false;
        sendBtn.disabled = false;
      }
    }

    async function loadProfiles() {
      try {
        const data = await api("GET", "/api/profiles");
        apiProfiles = data.profiles || [];

        const saved = localStorage.getItem("claude_web_profile_id") || "";
        const def = apiProfiles.find(p => p.is_default);
        const savedP = apiProfiles.find(p => p.id === saved);

        if (savedP) activeProfileId = savedP.id;
        else if (def) activeProfileId = def.id;
        else if (apiProfiles.length) activeProfileId = apiProfiles[0].id;
        else activeProfileId = "";

        renderProfileSelect();
        applyProfile();
      } catch (e) {
        console.log(e);
      }
    }

    function renderProfileSelect() {
      apiProfileSelectEl.innerHTML = "";

      if (!apiProfiles.length) {
        const o = document.createElement("option");
        o.value = "";
        o.textContent = "未保存接入商";
        apiProfileSelectEl.appendChild(o);
        return;
      }

      apiProfiles.forEach(p => {
        const o = document.createElement("option");
        o.value = p.id;
        o.textContent = p.name + (p.is_default ? "（默认）" : "");
        apiProfileSelectEl.appendChild(o);
      });

      apiProfileSelectEl.value = activeProfileId || "";
    }

    function applyProfile() {
      const p = apiProfiles.find(x => x.id === activeProfileId);
      if (!p) return;
      apiProfileNameEl.value = p.name || "";
      apiBaseUrlEl.value = p.base_url || "";
      apiAuthTokenEl.value = p.auth_token || "";
      apiModelEl.value = p.model || "claude-opus-4-7";
      localStorage.setItem("claude_web_profile_id", activeProfileId);
      updateModelUI();
    }

    async function saveProfile() {
      const body = {
        name: apiProfileNameEl.value.trim() || "未命名",
        base_url: apiBaseUrlEl.value.trim(),
        auth_token: apiAuthTokenEl.value.trim(),
        model: getCurrentModel(),
        is_default: false
      };

      let data;
      if (activeProfileId) {
        data = await api("PUT", `/api/profiles/${activeProfileId}`, body);
      } else {
        data = await api("POST", "/api/profiles", body);
      }
      if (data.id) activeProfileId = data.id;
      await loadProfiles();
    }

    async function setDefaultProfile() {
      if (!activeProfileId) await saveProfile();
      if (!activeProfileId) return;
      await api("POST", `/api/profiles/${activeProfileId}/default`);
      await loadProfiles();
    }

    async function testProfile() {
      const body = {
        name: apiProfileNameEl.value.trim() || "未命名",
        base_url: apiBaseUrlEl.value.trim(),
        auth_token: apiAuthTokenEl.value.trim(),
        model: getCurrentModel(),
        is_default: false
      };

      if (!body.base_url || !body.auth_token || !body.model) {
        profileTestResultEl.textContent = "请先填写 URL / Key / 模型";
        profileTestResultEl.className = "profile-test-result bad";
        return;
      }

      profileTestResultEl.textContent = "测试中...";
      profileTestResultEl.className = "profile-test-result";

      try {
        const data = await api("POST", "/api/profiles/test", body);
        if (data.ok) {
          profileTestResultEl.textContent = data.reply || "API配置可用";
          profileTestResultEl.className = "profile-test-result good";
        } else {
          profileTestResultEl.textContent = "失败：" + (data.reply || "未知错误");
          profileTestResultEl.className = "profile-test-result bad";
        }
      } catch (e) {
        profileTestResultEl.textContent = "请求失败：" + e;
        profileTestResultEl.className = "profile-test-result bad";
      }
    }

    async function fetchModels() {
      const body = {
        name: apiProfileNameEl.value.trim() || "未命名",
        base_url: apiBaseUrlEl.value.trim(),
        auth_token: apiAuthTokenEl.value.trim(),
        model: getCurrentModel(),
        is_default: false
      };

      fetchedModelsEl.innerHTML = "";
      profileTestResultEl.textContent = "正在拉取模型列表...";
      profileTestResultEl.className = "profile-test-result";

      try {
        const data = await api("POST", "/api/profiles/models", body);

        if (!data.ok) {
          profileTestResultEl.textContent = "拉取失败：" + (data.error || "未知错误");
          profileTestResultEl.className = "profile-test-result bad";
          return;
        }

        const models = data.models || [];

        if (!models.length) {
          profileTestResultEl.textContent = "没有返回模型列表";
          profileTestResultEl.className = "profile-test-result bad";
          return;
        }

        profileTestResultEl.textContent = "已拉取 " + models.length + " 个模型";
        profileTestResultEl.className = "profile-test-result good";

        fetchedModelsEl.innerHTML = models.map(m =>
          `<button type="button" class="fetched-model-btn" data-model="${escapeHtml(m)}">${escapeHtml(m)}</button>`
        ).join("");

      } catch (e) {
        profileTestResultEl.textContent = "拉取失败：" + e;
        profileTestResultEl.className = "profile-test-result bad";
      }
    }

    async function deleteProfile() {
      if (!activeProfileId) return;
      if (!confirm("确定删除当前接入商配置吗？此操作不可恢复。")) return;
      await api("DELETE", `/api/profiles/${activeProfileId}`);
      activeProfileId = "";
      localStorage.removeItem("claude_web_profile_id");
      await loadProfiles();
    }

    function newProfile() {
      apiProfileNameEl.value = "";
      apiBaseUrlEl.value = "";
      apiAuthTokenEl.value = "";
      activeProfileId = "";
      apiProfileSelectEl.value = "";
      updateModelUI();
    }

    function clearSelectedFiles() {
      fileInputEl.value = "";
      filenameEl.textContent = "";
      previewEl.innerHTML = "";
      clearFilesBtn.style.display = "none";
    }

    function openDrawer() {
      sideDrawer.classList.add("open");
      drawerOverlay.classList.add("open");
    }
    function closeDrawer() {
      sideDrawer.classList.remove("open");
      drawerOverlay.classList.remove("open");
    }

    drawerOpenBtn.addEventListener("click", openDrawer);
    drawerCloseBtn.addEventListener("click", closeDrawer);
    drawerOverlay.addEventListener("click", closeDrawer);

    newSessionBtn.addEventListener("click", createConversation);
    renameBtn.addEventListener("click", renameConversation);
    deleteConvBtn.addEventListener("click", deleteConversation);
    exportBtn.addEventListener("click", () => {
      if (!activeConversationId) return;
      window.open(`/api/conversations/${activeConversationId}/export.md`, "_blank");
    });

    shareBtn.addEventListener("click", () => {
      if (!activeConversationId) return;
      window.open(`/api/conversations/${activeConversationId}/export.md`, "_blank");
    });

    modelChoicesEl.addEventListener("click", (e) => {
      const btn = e.target.closest(".model-choice");
      if (!btn) return;

      const m = btn.dataset.model;

      if (m === "custom") {
        customModelBoxEl.style.display = "block";
        apiModelEl.focus();
      } else {
        apiModelEl.value = m;
        rememberCurrentModel();
      }

      updateModelUI();
    });

    apiModelEl.addEventListener("input", updateModelUI);
    apiModelEl.addEventListener("change", updateModelUI);


    modelPillEl.addEventListener("click", openDrawer);

    apiProfileSelectEl.addEventListener("change", () => {
      activeProfileId = apiProfileSelectEl.value;
      applyProfile();
    });

    newProfileBtn.addEventListener("click", newProfile);
    saveProfileBtn.addEventListener("click", saveProfile);
    testProfileBtn.addEventListener("click", testProfile);
    fetchModelsBtn.addEventListener("click", fetchModels);
    defaultProfileBtn.addEventListener("click", setDefaultProfile);
    deleteProfileBtn.addEventListener("click", deleteProfile);

    fetchedModelsEl.addEventListener("click", (e) => {
      const btn = e.target.closest(".fetched-model-btn");
      if (!btn) return;
      apiModelEl.value = btn.dataset.model;
      updateModelUI();
      profileTestResultEl.textContent = "已选择模型：" + btn.dataset.model;
      profileTestResultEl.className = "profile-test-result good";
    });

    plusBtn.addEventListener("click", () => fileInputEl.click());
    clearFilesBtn.addEventListener("click", clearSelectedFiles);

    fileInputEl.addEventListener("change", () => {
      const files = fileInputEl.files;
      if (!files || !files.length) {
        clearSelectedFiles();
        return;
      }

      clearFilesBtn.style.display = "inline-block";

      const names = Array.from(files).map(f => f.name);
      filenameEl.textContent = "已选择 " + files.length + " 个文件: " + names.join(", ");

      previewEl.innerHTML = "";
      Array.from(files).forEach(f => {
        if (f.type && f.type.startsWith("image/")) {
          const url = URL.createObjectURL(f);
          const img = document.createElement("img");
          img.src = url;
          img.alt = f.name;
          img.style.cssText = "max-width:68px;max-height:68px;border-radius:10px;border:1px solid rgba(255,255,255,0.10);margin:4px 4px 0 0;display:inline-block;vertical-align:top;";
          previewEl.appendChild(img);
        }
      });
    });

    sendBtn.addEventListener("click", sendPrompt);

    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendPrompt();
      }
    });

    chatListEl.addEventListener("click", (e) => {
      const del = e.target.closest(".delete-msg-btn");
      if (del) {
        const idx = Number(del.dataset.idx);
        deleteMessageAndAfter(idx);
        return;
      }
      const regen = e.target.closest(".regen-btn");
      if (regen) {
        const idx = Number(regen.dataset.idx);
        if (!Number.isNaN(idx)) {
          regenerateFromMessage(idx);
        } else {
          regenerate();
        }
      }
    });

    (async function boot() {
      try {
        const saved = localStorage.getItem("claude_web_model");
        if (saved) apiModelEl.value = saved;
      } catch (e) {}

      updateModelUI();
      await loadProfiles();

      const remembered = getRememberedModelForCurrentProvider();
      if (remembered) {
        apiModelEl.value = remembered;
      }
      updateModelUI();

      await loadConversations();
    })();
  </script>
